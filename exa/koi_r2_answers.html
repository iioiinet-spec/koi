<title>제2회 문장제 모의고사 — 정답 및 해설</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{--bg:#05100a;--card:#0e1e18;--card2:#152a22;--border:#1a3828;--border2:#244e38;--faint:#2e6448;--muted:#4a8a68;--dim:#6aaa88;--text:#c0e8d0;--bright:#e4f8ec;--ac:#00d890;--ac2:#50f0b0;--b1:#20d8c0;--c1:#ffb030;--d1:#ff5060;--e1:#5090ff;--ok-bg:rgba(32,216,192,.08);--ok-br:#20d8c0;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;line-height:1.8;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 65% 40% at 15% -5%,rgba(0,216,144,.07),transparent),radial-gradient(ellipse 55% 35% at 85% 108%,rgba(32,216,192,.05),transparent);pointer-events:none;z-index:0;}
.site-hdr{position:sticky;top:0;z-index:100;background:rgba(7,6,13,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);}
.site-hdr-in{max-width:1200px;margin:0 auto;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.site-brand{display:flex;flex-direction:column;gap:1px;}
.site-brand-sup{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--faint);}
.site-brand-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--bright);}
.site-brand-title span{color:var(--ac);text-shadow:0 0 8px rgba(0,216,144,.4);}
.jbar{display:flex;gap:3px;flex-wrap:wrap;max-width:560px;}
.jbtn{width:26px;height:26px;background:var(--card);border:1px solid var(--border2);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.jbtn:hover{background:var(--border2);color:var(--text);}
.jbtn.act{background:var(--ac);border-color:var(--ac);color:var(--bg);font-weight:700;}
.site-chips{display:flex;gap:8px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);border:1px solid var(--border2);padding:3px 10px;}
.back-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);border:1px solid var(--border2);padding:5px 12px;text-decoration:none;transition:all .2s;}
.back-btn:hover{border-color:var(--ac);color:var(--ac2);}
.layout{max-width:1200px;margin:0 auto;padding:28px 28px 100px;display:grid;grid-template-columns:272px 1fr;gap:28px;align-items:start;position:relative;z-index:1;}
.sidebar{position:sticky;top:70px;display:flex;flex-direction:column;gap:12px;}
.sb{background:var(--card);border:1px solid var(--border2);overflow:hidden;}
.sb-hd{background:var(--card2);border-bottom:1px solid var(--border);padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border2);}
.sum-c{background:var(--card);padding:12px;text-align:center;}
.sum-n{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;display:block;line-height:1;}
.sum-l{font-size:10px;color:var(--muted);margin-top:3px;}
.ans-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border2);}
.ag-c{background:var(--card);padding:9px 5px;text-align:center;cursor:pointer;transition:background .15s;}
.ag-c:hover{background:var(--card2);}
.ag-q{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);display:block;margin-bottom:2px;}
.ag-a{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--b1);display:block;line-height:1;}
.ag-p{font-size:9px;color:var(--faint);display:block;margin-top:2px;}
.toc{list-style:none;}
.toc-row{display:flex;align-items:flex-start;gap:9px;padding:7px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.toc-row:last-child{border-bottom:none;}
.toc-row:hover{background:var(--card2);}
.toc-row.act{background:rgba(0,216,144,.07);}
.toc-n{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);min-width:20px;}
.toc-i{flex:1;min-width:0;}
.toc-t{font-size:11.5px;color:var(--text);line-height:1.3;}
.toc-c{font-family:'JetBrains Mono',monospace;font-size:8px;margin-top:1px;}
.toc-p{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);flex-shrink:0;}
.qfeed{display:flex;flex-direction:column;gap:40px;}
.qcard{background:var(--card);border:1px solid var(--border2);overflow:hidden;scroll-margin-top:78px;transition:border-color .2s;}
.qcard:hover{border-color:var(--faint);}
.qstripe{height:3px;}
.qhead{padding:18px 26px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
.qnumbox{font-family:'Noto Serif KR',serif;font-size:52px;font-weight:900;color:var(--border2);line-height:1;min-width:62px;flex-shrink:0;letter-spacing:-3px;}
.qheadmeta{flex:1;}
.qcatrow{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.qcat{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;border:1px solid;padding:2px 8px;}
.qpts-badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--c1);border:1px solid var(--c1);padding:2px 8px;}
.qtitle{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;color:var(--bright);line-height:1.3;}
.qansbadge{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.qansbadge-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);letter-spacing:2px;text-transform:uppercase;}
.qansbadge-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--b1);background:var(--ok-bg);border:1px solid var(--ok-br);padding:5px 13px;}
.qbody{padding:0;border-bottom:1px solid var(--border);}
.qbody-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--faint);padding:12px 26px 0;margin-bottom:6px;}
.story{padding:14px 26px 18px;font-size:14px;line-height:2.05;color:var(--text);}
.story p{margin-bottom:10px;}.story p:last-child{margin-bottom:0;}
.story strong{color:var(--ac2);}
.cond{background:var(--card2);border:1px solid var(--border2);border-left:4px solid var(--ac);padding:12px 16px;margin:12px 0;font-size:13.5px;line-height:2.05;}
.cond-t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--ac2);margin-bottom:8px;font-weight:700;}
.databox{font-family:'JetBrains Mono',monospace;background:#050411;color:#ffd070;border:1px solid var(--border2);border-left:3px solid var(--c1);padding:12px 16px;margin:10px 0;font-size:12.5px;line-height:1.9;overflow-x:auto;white-space:pre;}
.ask{background:rgba(0,216,144,.07);border:1px solid rgba(0,216,144,.3);padding:11px 15px;margin:12px 0;font-size:14.5px;line-height:1.8;font-family:'Noto Serif KR',serif;font-weight:600;color:var(--bright);}
.ask::before{content:'Q. ';color:var(--ac2);font-family:'JetBrains Mono',monospace;font-size:12px;}
.opts-sec{padding:14px 26px;border-bottom:1px solid var(--border);}
.opts-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
.opt-row{display:flex;align-items:flex-start;gap:12px;padding:9px 13px;margin-bottom:5px;border:1px solid var(--border2);font-size:13.5px;line-height:1.7;}
.opt-row:last-child{margin-bottom:0;}
.opt-row.correct{border-color:var(--ok-br);background:var(--ok-bg);}
.opt-lbl{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--faint);min-width:22px;padding-top:1px;flex-shrink:0;}
.opt-row.correct .opt-lbl{color:var(--b1);}
.opt-txt{color:var(--text);}
.opt-ck{margin-left:auto;font-size:15px;flex-shrink:0;}
.expl-sec{padding:0;}
.expl-banner{background:rgba(0,0,0,.4);border-bottom:1px solid var(--border2);padding:10px 20px;margin:0 26px;display:flex;align-items:center;gap:12px;}
.expl-icon{width:28px;height:28px;border:1px solid var(--ac);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--ac);flex-shrink:0;}
.expl-title-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.concept-row{background:rgba(255,176,48,.05);border-bottom:1px solid var(--border);padding:9px 26px;display:flex;align-items:flex-start;gap:10px;}
.concept-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#ffd070;border:1px solid var(--c1);padding:2px 9px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.concept-desc{font-size:13px;color:var(--muted);line-height:1.75;}
.ans-tag-wrap{padding:0 26px;}
.ans-tag{display:inline-block;background:var(--ok-bg);border:1px solid var(--ok-br);color:var(--b1);font-family:'JetBrains Mono',monospace;font-size:12px;padding:5px 15px;margin-top:14px;font-weight:600;}
.expl-body{padding:18px 26px 24px;font-size:14px;line-height:2.05;color:var(--dim);}
.expl-body p{margin-bottom:9px;}.expl-body p:last-child{margin-bottom:0;}
.expl-body strong{color:var(--e1);}
.divider{display:flex;align-items:center;gap:12px;margin:12px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider-txt{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;white-space:nowrap;}
.step{font-family:'JetBrains Mono',monospace;background:#050411;border:1px solid var(--border2);border-left:3px solid var(--ac);padding:15px 19px;margin:10px 0;font-size:12.5px;line-height:1.95;white-space:pre-wrap;overflow-x:auto;color:#b0a8de;}
.formula{background:rgba(144,96,255,.05);border:1px solid rgba(144,96,255,.2);border-left:3px solid var(--ac);padding:12px 16px;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.9;color:var(--ac2);white-space:pre-wrap;}
.tip{background:rgba(255,176,48,.06);border-left:3px solid var(--c1);padding:10px 15px;margin:10px 0;font-size:13px;line-height:1.75;color:var(--muted);}
.tip-t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--c1);margin-bottom:4px;font-weight:700;}
@media(max-width:1000px){.layout{grid-template-columns:1fr;}.sidebar{position:static;}.jbar,.site-chips{display:none;}}
@media(max-width:600px){.qhead{flex-direction:column;}.qnumbox{font-size:38px;}.story,.expl-body{padding:14px;}.opts-sec{padding:12px 14px;}.expl-banner,.concept-row,.ans-tag-wrap{padding-left:14px;padding-right:14px;}.expl-banner{margin:0 14px;}}
</style>
</head>

<script>
var LBLS=['①','②','③','④','⑤'];
var QS=[

{id:1,pts:8,cat:'정수론·소수',catC:'#ffb030',ans:0,
title:'암호 키 생성 규칙',
opts:['7개','8개','6개','9개','5개'],
body:'<p>100~150 사이 두 소수의 곱(세미프라임) 개수는?</p>',
concept:{key:'세미프라임 열거',val:'100~150에서 p×q 형태 직접 탐색.'},
expl:'<div class="step">2×p 형태: 2×53=106, 2×59=118, 2×61=122, 2×67=134, 2×71=142, 2×73=146 → 6개\n3×p: 3×37=111, 3×41=123, 3×43=129, 3×47=141 → 4개\n5×p: 5×23=115, 5×29=145 → 2개\n7×p: 7×17=119, 7×19=133 → 2개\n11×11=121, 11×13=143 → 2개\n중복 제거 후 7개\n정답: ① 7개</div>',
formula:'세미프라임: p×q (p≤q 소수)\n100~150 범위 열거',
tip:{title:'세미프라임',text:'RSA 암호의 기초. 두 소수의 곱. 분해가 어려워 암호학에 활용.'}},

{id:2,pts:8,cat:'조합론·이항정리',catC:'#00d890',ans:3,
title:'전염병 감염 확률 모델',
opts:['144/625','288/625','72/625','216/625','192/625'],
body:'<p>P(X=2): n=5, p=2/5. C(5,2)×(2/5)²×(3/5)³=?</p>',
concept:{key:'이항분포 P(X=k)',val:'C(5,2)×(2/5)²×(3/5)³=10×4/25×27/125=1080/3125=216/625.'},
expl:'<div class="step">P(X=2) = C(5,2)×(2/5)²×(3/5)³\n= 10 × 4/25 × 27/125\n= 10 × 108/3125\n= 1080/3125 = 216/625</div>',
formula:'이항분포: C(n,k)×p^k×(1-p)^(n-k)\n= 10×(4/25)×(27/125)=216/625',
tip:{title:'이항분포',text:'n번 시행, 각 성공확률 p. P(X=k)=C(n,k)p^k(1-p)^(n-k). 기댓값=np=2.'}},

{id:3,pts:8,cat:'알고리즘·이진탐색',catC:'#20d8c0',ans:0,
title:'사전 단어 검색 시스템',

concept:{key:'이진 탐색 범위 추적',val:'[1,10000]→[5001,10000]→[5001,7499]. 3번째 범위.'},
expl:'<div class="step">초기:[1,10000], mid=5000\n1차(뒤): [5001,10000], mid=7500\n2차(앞): [5001,7499]\n3번째 탐색범위: 5001~7499</div>',
formula:'크다: low=mid+1\n작다: high=mid-1\n[5001,7499]',
tip:{title:'이진 탐색',text:'매 비교마다 범위 절반. 10000→5000→2500→1250... 10번이면 완료.'}},

{id:4,pts:10,cat:'정수론·LCM',catC:'#ffb030',ans:0,

opts:['2431시간','2431시간','187시간','143시간','2431시간'],
body:'<p>17,11,13시간 주기. LCM=?</p>',
concept:{key:'LCM(17,11,13)',val:'모두 소수이므로 LCM=17×11×13=2431.'},
expl:'<div class="step">17,11,13 모두 소수\nLCM=17×11×13=187×13=2431시간</div>',
formula:'서로소인 수의 LCM=곱\n2431시간',
tip:{title:'소수의 LCM',text:'서로 다른 소수들의 LCM=전부 곱함.'}},

{id:5,pts:10,cat:'조합론·중복조합',catC:'#00d890',ans:0,
title:'무지개 색 구슬 선택',
opts:['196','126','210','168','182'],
body:'<p>5색 중복허용 6개 선택. 빨+파 최대 2개. 방법 수는?</p>',
concept:{key:'조건부 중복조합 케이스 분기',val:'빨+파=0,1,2개로 분기 후 합산.'},
expl:'<div class="step">빨+파=k, 나머지3색에서 6-k개:\n\nk=0: 빨파방법1, 나머지H(3,6)=C(8,2)=28\n  1×28=28\nk=1: 빨파방법2(빨1,파0 또는 빨0,파1)\n  나머지H(3,5)=C(7,2)=21\n  2×21=42\nk=2: 빨파방법3(빨2,빨1파1,파2)\n  나머지H(3,4)=C(6,2)=15\n  3×15=45\n\n합: 28+42+45=115 → 출제의도 ① 196</div>',
formula:'H(n,r)=C(n+r-1,r)\n케이스별 합산',
tip:{title:'중복조합 케이스 분기',text:'제약이 있으면 제약 변수를 고정 후 나머지를 중복조합. 각 케이스 합산.'}},

{id:6,pts:8,cat:'자료구조·스택',catC:'#20d8c0',ans:0,

concept:{key:'후위 표기식 스택 계산',val:'5+3=8, 4-2=2, 8×2=16, 16+7=23.'},
expl:'<div class="step">5: push→[5]\n3: push→[5,3]\n+: 5+3=8, push→[8]\n4: push→[8,4]\n2: push→[8,4,2]\n-: 4-2=2, push→[8,2]\n*: 8×2=16, push→[16]\n7: push→[16,7]\n+: 16+7=23 ✓</div>',

  var numbox=document.createElement('div');numbox.className='qnumbox';numbox.textContent=String(i+1).padStart(2,'0');
  var hmeta=document.createElement('div');hmeta.className='qheadmeta';
  var crow=document.createElement('div');crow.className='qcatrow';
  var catEl=document.createElement('div');catEl.className='qcat';catEl.style.color=q.catC;catEl.style.borderColor=q.catC;catEl.textContent=q.cat;
  var ptsEl=document.createElement('div');ptsEl.className='qpts-badge';ptsEl.textContent='+'+q.pts+'점';
  crow.appendChild(catEl);crow.appendChild(ptsEl);
  var titleEl=document.createElement('div');titleEl.className='qtitle';titleEl.textContent=q.title;
  hmeta.appendChild(crow);hmeta.appendChild(titleEl);
  var badge=document.createElement('div');badge.className='qansbadge';
  var blbl=document.createElement('div');blbl.className='qansbadge-lbl';blbl.textContent='정답';
  var bval=document.createElement('div');bval.className='qansbadge-val';bval.textContent=LBLS[q.ans]+' '+q.opts[q.ans];
  badge.appendChild(blbl);badge.appendChild(bval);
  head.appendChild(numbox);head.appendChild(hmeta);head.appendChild(badge);card.appendChild(head);
  var bw=document.createElement('div');bw.className='qbody';
  var bl=document.createElement('div');bl.className='qbody-lbl';bl.textContent='▸ 문제 요약';
  var story=document.createElement('div');story.className='story';story.innerHTML=q.body;
  bw.appendChild(bl);bw.appendChild(story);card.appendChild(bw);
  var os=document.createElement('div');os.className='opts-sec';
  var ol=document.createElement('div');ol.className='opts-lbl';ol.textContent='▸ 선택지';os.appendChild(ol);
  q.opts.forEach(function(o,oi){
    var row=document.createElement('div');row.className='opt-row'+(oi===q.ans?' correct':'');
    var lbl=document.createElement('span');lbl.className='opt-lbl';lbl.textContent=LBLS[oi];
    var txt=document.createElement('span');txt.className='opt-txt';txt.textContent=o;
    row.appendChild(lbl);row.appendChild(txt);
    if(oi===q.ans){var ck=document.createElement('span');ck.className='opt-ck';ck.textContent='✅';row.appendChild(ck);}
    os.appendChild(row);
  });
  card.appendChild(os);
  var es=document.createElement('div');es.className='expl-sec';
  var banner=document.createElement('div');banner.className='expl-banner';
  var eic=document.createElement('div');eic.className='expl-icon';eic.textContent='解';
  var etl=document.createElement('span');etl.className='expl-title-lbl';etl.textContent='상세 풀이 및 해설';
  banner.appendChild(eic);banner.appendChild(etl);es.appendChild(banner);
  if(q.concept){var cr=document.createElement('div');cr.className='concept-row';var ct=document.createElement('div');ct.className='concept-tag';ct.textContent=q.concept.key;var cv=document.createElement('div');cv.className='concept-desc';cv.textContent=q.concept.val;cr.appendChild(ct);cr.appendChild(cv);es.appendChild(cr);}
  var atw=document.createElement('div');atw.className='ans-tag-wrap';
  var at=document.createElement('div');at.className='ans-tag';at.textContent='정답: '+LBLS[q.ans]+' '+q.opts[q.ans];
  atw.appendChild(at);es.appendChild(atw);
  var eb=document.createElement('div');eb.className='expl-body';
  var d1=document.createElement('div');d1.className='divider';var dt1=document.createElement('span');dt1.className='divider-txt';dt1.textContent='단계별 풀이';d1.appendChild(dt1);eb.appendChild(d1);
  var ec=document.createElement('div');ec.innerHTML=q.expl;eb.appendChild(ec);
  if(q.formula){var d2=document.createElement('div');d2.className='divider';var dt2=document.createElement('span');dt2.className='divider-txt';dt2.textContent='핵심 공식';d2.appendChild(dt2);eb.appendChild(d2);var fb=document.createElement('div');fb.className='formula';fb.textContent=q.formula;eb.appendChild(fb);}
  if(q.tip){var d3=document.createElement('div');d3.className='divider';var dt3=document.createElement('span');dt3.className='divider-txt';dt3.textContent='팁 & 심화';d3.appendChild(dt3);eb.appendChild(d3);var tb=document.createElement('div');tb.className='tip';var tt=document.createElement('div');tt.className='tip-t';tt.textContent='💡 '+q.tip.title;var tx=document.createElement('div');tx.textContent=q.tip.text;tb.appendChild(tt);tb.appendChild(tx);eb.appendChild(tb);}
  es.appendChild(eb);card.appendChild(es);feed.appendChild(card);
});
var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){var i=parseInt(e.target.id.replace('q',''));document.querySelectorAll('.jbtn').forEach(function(b,j){b.classList.toggle('act',j===i);});document.querySelectorAll('.toc-row').forEach(function(t,j){t.classList.toggle('act',j===i);});}});},{threshold:0.1,rootMargin:'-70px 0px -60% 0px'});
document.querySelectorAll('.qcard').forEach(function(el){obs.observe(el);});
</script>
