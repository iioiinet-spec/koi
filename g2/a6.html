<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOI 사고력 모의고사 2회 — 정답 및 해설</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  --bg: #0d1117;
  --card: #161b22;
  --card2: #1c2330;
  --card3: #0f1923;
  --border: #30363d;
  --border2: #21262d;
  --blue: #58a6ff;
  --green: #3fb950;
  --red: #f78166;
  --purple: #d2a8ff;
  --amber: #ffa657;
  --teal: #39d3bb;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  line-height: 1.75;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(88,166,255,.04) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none; z-index: 0;
}

/* ══ SITE HEADER ══ */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.site-header-inner {
  max-width: 1200px; margin: 0 auto;
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}

.site-logo {
  display: flex; flex-direction: column; gap: 1px;
}
.site-logo-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 4px;
  color: var(--text3); text-transform: uppercase;
}
.site-logo-title {
  font-family: 'Gowun Batang', serif;
  font-size: 18px; font-weight: 700; color: var(--text);
}
.site-logo-title span { color: var(--blue); }

.q-jump-bar {
  display: flex; gap: 3px; flex-wrap: wrap;
  max-width: 560px;
}
.jbtn {
  width: 28px; height: 28px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; cursor: pointer; border-radius: 3px;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.jbtn:hover { background: var(--border); color: var(--text); }
.jbtn.active {
  background: var(--blue); border-color: var(--blue);
  color: #0d1117; font-weight: 700;
}

.site-meta {
  display: flex; gap: 16px; align-items: center;
}
.meta-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text2);
  border: 1px solid var(--border2);
  padding: 4px 10px;
}

/* ══ LAYOUT ══ */
.layout {
  max-width: 1200px; margin: 0 auto;
  padding: 32px 24px 120px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 28px;
  align-items: start;
  position: relative; z-index: 1;
}

/* ══ SIDEBAR ══ */
.sidebar {
  position: sticky; top: 80px;
  display: flex; flex-direction: column; gap: 16px;
}

.sb-card {
  background: var(--card);
  border: 1px solid var(--border);
  overflow: hidden;
}

.sb-head {
  background: var(--card2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 3px;
  color: var(--text2); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}

/* answer grid */
.ans-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 1px; background: var(--border2);
}
.ans-cell {
  background: var(--card); padding: 10px 8px;
  text-align: center; cursor: pointer;
  transition: background .15s;
}
.ans-cell:hover { background: var(--card2); }
.ans-cell-q {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text3);
  display: block; margin-bottom: 3px;
}
.ans-cell-a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 700;
  color: var(--green); display: block; line-height: 1;
}
.ans-cell-p {
  font-size: 10px; color: var(--text3);
  margin-top: 2px; display: block;
}

/* toc */
.toc-list { list-style: none; }
.toc-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border2);
  cursor: pointer; transition: background .15s;
}
.toc-item:last-child { border-bottom: none; }
.toc-item:hover { background: var(--card2); }
.toc-item.active { background: rgba(88,166,255,.08); }
.toc-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3); min-width: 24px;
}
.toc-info { flex: 1; min-width: 0; }
.toc-title { font-size: 12px; color: var(--text2); line-height: 1.4; }
.toc-cat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1px;
  margin-top: 2px;
}
.toc-pts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3); flex-shrink: 0;
}

/* score summary */
.score-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border2);
}
.score-cell {
  background: var(--card); padding: 14px 12px; text-align: center;
}
.score-n {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 700;
  display: block; line-height: 1;
}
.score-l { font-size: 10px; color: var(--text2); margin-top: 4px; }

/* ══ QUESTION CARDS ══ */
.q-feed { display: flex; flex-direction: column; gap: 40px; }

.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  overflow: hidden;
  scroll-margin-top: 88px;
  transition: border-color .2s;
}
.q-card:hover { border-color: var(--text3); }

/* top stripe */
.q-stripe { height: 3px; }

/* card head */
.q-head {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: flex-start; gap: 18px;
}
.q-numbox {
  font-family: 'Gowun Batang', serif;
  font-size: 56px; font-weight: 700;
  color: var(--border); line-height: 1; flex-shrink: 0;
  min-width: 70px;
}
.q-headinfo { flex: 1; }
.q-catrow {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.q-cat-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  border: 1px solid; padding: 2px 8px;
}
.q-pts-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--amber);
  border: 1px solid var(--amber);
  padding: 2px 8px;
}
.q-title {
  font-family: 'Gowun Batang', serif;
  font-size: 20px; font-weight: 700; color: var(--text);
  line-height: 1.3;
}
.ans-pill {
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0;
}
.ans-pill-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 2px;
}
.ans-pill-val {
  background: rgba(63,185,80,.12);
  border: 1px solid var(--green);
  padding: 6px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 700; color: var(--green);
}

/* question body */
.q-body-wrap {
  padding: 22px 28px;
  border-bottom: 1px solid var(--border2);
  font-size: 14.5px; line-height: 2;
}
.q-body-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--text3); text-transform: uppercase; margin-bottom: 12px;
}
.q-body-wrap p { margin-bottom: 10px; }
.q-body-wrap p:last-child { margin-bottom: 0; }
.q-body-wrap strong { color: var(--blue); }
.q-body-wrap em { color: var(--amber); font-style: normal; font-weight: 700; }
.q-body-wrap ul, .q-body-wrap ol { margin: 8px 0 8px 24px; line-height: 2.3; }
.q-body-wrap li { padding-left: 4px; }

.scenario-box {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--amber);
  padding: 14px 18px; margin: 14px 0;
  font-size: 14px; line-height: 1.95;
}
.sb-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--amber); text-transform: uppercase; margin-bottom: 8px;
}
.codeblock {
  font-family: 'JetBrains Mono', monospace;
  background: var(--card3);
  border: 1px solid var(--border2);
  padding: 12px 16px; margin: 10px 0;
  font-size: 13px; line-height: 1.8;
  overflow-x: auto; white-space: pre; color: #a5d6ff;
}
.qtable-wrap { margin: 12px 0; overflow-x: auto; }
.qtable {
  border-collapse: collapse; width: 100%; font-size: 13px;
}
.qtable th {
  background: var(--card2); border: 1px solid var(--border);
  padding: 8px 14px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 1px; text-align: center;
}
.qtable td {
  border: 1px solid var(--border); padding: 8px 14px;
  text-align: center; color: var(--text);
}
.qtable td.hl { color: var(--blue); font-weight: 700; }

/* options */
.opts-section {
  padding: 18px 28px;
  border-bottom: 1px solid var(--border2);
}
.opts-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--text3); text-transform: uppercase; margin-bottom: 10px;
}
.opt-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 14px; margin-bottom: 6px;
  border: 1px solid var(--border2);
  font-size: 13.5px; line-height: 1.65;
}
.opt-row:last-child { margin-bottom: 0; }
.opt-row.correct-opt {
  border-color: var(--green);
  background: rgba(63,185,80,.08);
}
.opt-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700;
  color: var(--text3); min-width: 22px; flex-shrink: 0;
  padding-top: 1px;
}
.opt-row.correct-opt .opt-lbl { color: var(--green); }
.opt-check { margin-left: auto; font-size: 16px; flex-shrink: 0; }

/* short answer display */
.short-ans-display {
  padding: 16px 28px;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; gap: 14px;
}
.short-ans-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  color: var(--text3); text-transform: uppercase;
}
.short-ans-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 700; color: var(--green);
  background: rgba(63,185,80,.08);
  border: 1px solid var(--green);
  padding: 6px 20px;
}

/* explanation */
.expl-section { padding: 0; }

.expl-head {
  background: var(--card3);
  border-bottom: 1px solid var(--border2);
  padding: 14px 28px;
  display: flex; align-items: center; gap: 12px;
}
.expl-icon-box {
  width: 30px; height: 30px;
  background: rgba(88,166,255,.1);
  border: 1px solid var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.expl-head-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 3px;
  color: var(--text2); text-transform: uppercase;
}

.concept-bar {
  background: rgba(88,166,255,.06);
  border-bottom: 1px solid var(--border2);
  padding: 12px 28px;
  display: flex; align-items: flex-start; gap: 12px;
}
.concept-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: var(--blue); text-transform: uppercase;
  border: 1px solid var(--blue); padding: 2px 8px;
  white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}
.concept-text { font-size: 13px; color: var(--text2); line-height: 1.7; }

.expl-body {
  padding: 22px 28px 26px;
  font-size: 14px; line-height: 1.95; color: var(--text2);
}
.expl-body p { margin-bottom: 10px; }
.expl-body p:last-child { margin-bottom: 0; }
.expl-body strong { color: var(--blue); }

.step-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 16px 0;
}
.step-divider::before, .step-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}
.step-divider-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: var(--text3); text-transform: uppercase; white-space: nowrap;
}

.step-box {
  font-family: 'JetBrains Mono', monospace;
  background: var(--card3);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--purple);
  padding: 16px 20px; margin: 12px 0;
  font-size: 12.5px; line-height: 1.9;
  white-space: pre-wrap; overflow-x: auto; color: #c9d1d9;
}

.tip-box {
  background: rgba(255,166,87,.06);
  border: 1px solid rgba(255,166,87,.3);
  border-left: 3px solid var(--amber);
  padding: 12px 16px; margin: 14px 0;
  font-size: 13px; line-height: 1.75;
}
.tip-box-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: var(--amber); text-transform: uppercase; margin-bottom: 6px;
}

.warn-box {
  background: rgba(247,129,102,.06);
  border: 1px solid rgba(247,129,102,.3);
  border-left: 3px solid var(--red);
  padding: 12px 16px; margin: 14px 0;
  font-size: 13px; line-height: 1.75;
}
.warn-box-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: var(--red); text-transform: uppercase; margin-bottom: 6px;
}

/* ══ RESPONSIVE ══ */
@media (max-width: 960px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .q-jump-bar, .site-meta { display: none; }
}
@media (max-width: 600px) {
  .q-head { flex-direction: column; gap: 12px; }
  .q-numbox { font-size: 36px; }
  .q-body-wrap, .expl-body { padding: 16px; }
  .opts-section { padding: 14px 16px; }
}
</style>
</head>
<body>

<!-- SITE HEADER -->
<div class="site-header">
  <div class="site-header-inner">
    <div class="site-logo">
      <span class="site-logo-eyebrow">KOI 창작 모의고사 2회</span>
      <div class="site-logo-title">정답 및 <span>상세 해설</span></div>
    </div>
    <div class="q-jump-bar" id="jbar"></div>
    <div class="site-meta">
      <div class="meta-chip">20문항</div>
      <div class="meta-chip">200점</div>
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- 점수 요약 -->
    <div class="sb-card">
      <div class="sb-head">📊 배점 요약</div>
      <div class="score-row">
        <div class="score-cell">
          <span class="score-n" style="color:var(--blue)">200</span>
          <div class="score-l">총 배점</div>
        </div>
        <div class="score-cell">
          <span class="score-n" style="color:var(--amber)">20</span>
          <div class="score-l">총 문항</div>
        </div>
        <div class="score-cell">
          <span class="score-n" style="color:var(--green)">9~11</span>
          <div class="score-l">문항 배점</div>
        </div>
        <div class="score-cell">
          <span class="score-n" style="color:var(--purple)">90</span>
          <div class="score-l">제한(분)</div>
        </div>
      </div>
    </div>

    <!-- 정답 한눈에 -->
    <div class="sb-card">
      <div class="sb-head">✅ 정답 한눈에 보기</div>
      <div class="ans-grid" id="ans-grid"></div>
    </div>

    <!-- 목차 -->
    <div class="sb-card">
      <div class="sb-head">📋 문제 목록</div>
      <ul class="toc-list" id="toc"></ul>
    </div>

  </aside>

  <!-- MAIN FEED -->
  <main>
    <div class="q-feed" id="feed"></div>
  </main>

</div>

<script>
// ══════════════════════════════════════════════════════
//  전체 해설 데이터 (20문제)
// ══════════════════════════════════════════════════════
const QS = [
  {
    id: 1, pts: 9,
    cat: "수론·정수", catColor: "#58a6ff",
    title: "신비로운 암호 자물쇠",
    type: "mcq",
    ansIdx: 0, ansShort: "① 23",
    opts: ["23", "38", "53", "68", "83"],
    body: `<p>고대 도서관의 비밀 방에는 특별한 암호 자물쇠가 달려 있다. 이 자물쇠를 열려면 올바른 숫자를 입력해야 한다.</p>
<div class="scenario-box"><div class="sb-title">📜 자물쇠 규칙</div>
<p>자물쇠는 다음 조건을 모두 만족하는 <strong>가장 작은 자연수 N</strong>을 입력해야 열린다.</p>
<ul><li>N을 3으로 나누면 나머지가 2이다.</li><li>N을 5로 나누면 나머지가 3이다.</li><li>N을 7로 나누면 나머지가 2이다.</li></ul></div>
<p>올바른 입력 숫자 <strong>N</strong>은 얼마인가?</p>`,
    concept: { tag: "중국인의 나머지 정리", text: "여러 나머지 조건을 동시에 만족하는 수를 찾을 때는, 조건 2개씩 묶어 LCM 주기로 교집합을 구하거나 직접 탐색합니다." },
    expl: `<p><strong>Step 1.</strong> 조건 1, 2를 동시에 만족하는 수 목록을 구합니다.</p>
<div class="step-box">N ≡ 2 (mod 3) → N = 2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35, 38 …
N ≡ 3 (mod 5) → N = 3, 8, 13, 18, 23, 28, 33, 38 …

교집합 (주기 LCM(3,5)=15): N = 8, 23, 38, 53 …</div>
<p><strong>Step 2.</strong> 교집합 중 조건 3도 만족하는 가장 작은 수를 찾습니다.</p>
<div class="step-box">N ≡ 2 (mod 7) → N = 2, 9, 16, 23, 30 …

N=8:  8÷7=1 나머지 1 ✗
N=23: 23÷7=3 나머지 2 ✓  ← 정답!</div>
<p><strong>Step 3.</strong> 검증</p>
<div class="step-box">N = 23
  23 = 3×7 + 2  → 나머지 2 ✓
  23 = 5×4 + 3  → 나머지 3 ✓
  23 = 7×3 + 2  → 나머지 2 ✓</div>`,
    tip: { title: "빠른 탐색 전략", text: "세 조건 중 가장 후보가 적은 조건부터 시작해 다른 조건으로 필터링하면 탐색이 빠릅니다. 여기서는 5의 배수+3이 가장 드물므로 N=3,8,13,18,23…에서 나머지 조건을 확인합니다." }
  },

  {
    id: 2, pts: 9,
    cat: "확률·경우의수", catColor: "#d2a8ff",
    title: "마법 카드 뽑기",
    type: "mcq",
    ansIdx: 0, ansShort: "① 13/18",
    opts: ["13/18", "5/12", "13/36", "5/18", "7/12"],
    body: `<p>카드 세트: 빨간 4장, 파란 3장, 노란 2장 (총 9장). 카드 2장을 무작위로 뽑을 때 <strong>서로 다른 색깔</strong>일 확률은?</p>
<div class="scenario-box"><div class="sb-title">🎴 행운 조합 = 서로 다른 색 2장</div></div>`,
    concept: { tag: "여사건 활용", text: "P(서로 다른 색) = 1 - P(같은 색). 같은 색끼리 뽑는 경우를 먼저 구하면 계산이 훨씬 간단해집니다." },

  const c = document.createElement('div');
  c.className = 'ans-cell';
  const shortAns = q.type === 'short' ? q.correct : LBLS[q.ansIdx];
  c.innerHTML = `<span class="ans-cell-q">Q${String(i+1).padStart(2,'0')}</span>
                 <span class="ans-cell-a">${shortAns}</span>
                 <span class="ans-cell-p">${q.pts}점</span>`;
  c.onclick = () => document.getElementById(`q${i}`).scrollIntoView({behavior:'smooth'});
  agrid.appendChild(c);
});

// TOC
const toc = document.getElementById('toc');
QS.forEach((q,i) => {
  const li = document.createElement('li');
  li.className = 'toc-item'; li.id = `ti${i}`;
  li.innerHTML = `<span class="toc-num">${String(i+1).padStart(2,'0')}</span>
    <div class="toc-info">
      <div class="toc-title">${q.title}</div>
      <div class="toc-cat" style="color:${q.catColor}">${q.cat}</div>
    </div>
    <span class="toc-pts">${q.pts}pt</span>`;
  li.onclick = () => document.getElementById(`q${i}`).scrollIntoView({behavior:'smooth'});
  toc.appendChild(li);
});

// Question cards
const feed = document.getElementById('feed');
QS.forEach((q,i) => {
  const card = document.createElement('article');
  card.className = 'q-card'; card.id = `q${i}`;

  // stripe
  const stripe = `<div class="q-stripe" style="background:${q.catColor}"></div>`;

  // head
  const ansDisplay = q.type === 'short' ? q.correct : `${LBLS[q.ansIdx]} ${q.opts[q.ansIdx]}`;
  const head = `<div class="q-head">
    <div class="q-numbox">${String(i+1).padStart(2,'0')}</div>
    <div class="q-headinfo">
      <div class="q-catrow">
        <div class="q-cat-tag" style="color:${q.catColor};border-color:${q.catColor}">${q.cat}</div>
        <div class="q-pts-tag">+${q.pts}점</div>
      </div>
      <div class="q-title">${q.title}</div>
    </div>
    <div class="ans-pill">
      <span class="ans-pill-label">정답</span>
      <div class="ans-pill-val">${q.type === 'short' ? q.correct : LBLS[q.ansIdx]}</div>
    </div>
  </div>`;

  // body
  const bodySection = `<div class="q-body-wrap">
    <div class="q-body-label">▸ 문제</div>
    ${q.body}
  </div>`;

  // options / short answer
  let ansSection = '';
  if (q.type === 'short') {
    ansSection = `<div class="short-ans-display">
      <span class="short-ans-label">정답</span>
      <div class="short-ans-val">${q.correct}</div>
    </div>`;
  } else {
    const optRows = q.opts.map((o, oi) => `
      <div class="opt-row ${oi === q.ansIdx ? 'correct-opt' : ''}">
        <span class="opt-lbl">${LBLS[oi]}</span>
        <span>${o}</span>
        ${oi === q.ansIdx ? '<span class="opt-check">✅</span>' : ''}
      </div>`).join('');
    ansSection = `<div class="opts-section">
      <div class="opts-label">▸ 선택지</div>
      ${optRows}
    </div>`;
  }

  // concept bar
  const conceptBar = q.concept ? `<div class="concept-bar">
    <div class="concept-tag">${q.concept.tag}</div>
    <div class="concept-text">${q.concept.text}</div>
  </div>` : '';

  // tip / warn box
  const tipBox = q.tip ? `<div class="tip-box">
    <div class="tip-box-title">💡 ${q.tip.title}</div>
    <div>${q.tip.text}</div>
  </div>` : '';

  const warnBox = q.warn ? `<div class="warn-box">
    <div class="warn-box-title">⚠ ${q.warn.title}</div>
    <div>${q.warn.text}</div>
  </div>` : '';

  // explanation
  const explSection = `<div class="expl-section">
    <div class="expl-head">
      <div class="expl-icon-box">💡</div>
      <span class="expl-head-title">상세 풀이 및 해설</span>
    </div>
    ${conceptBar}
    <div class="expl-body">
      <div class="step-divider"><span class="step-divider-text">풀이 과정</span></div>
      ${q.expl}
      ${tipBox}${warnBox}
    </div>
  </div>`;

  card.innerHTML = stripe + head + bodySection + ansSection + explSection;
  feed.appendChild(card);
});

// ── Intersection Observer (active highlight) ──
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const i = parseInt(e.target.id.replace('q',''));
      document.querySelectorAll('.jbtn').forEach((b,j) => b.classList.toggle('active', j===i));
      document.querySelectorAll('.toc-item').forEach((t,j) => t.classList.toggle('active', j===i));
    }
  });
}, { threshold: 0.15, rootMargin: '-80px 0px -60% 0px' });

document.querySelectorAll('.q-card').forEach(el => observer.observe(el));
</script>
</body>
</html>
