<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중등 정보올림피아드 이산수학 모의고사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --surface3: #1f2d45;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.5px;
  }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.85rem;
    color: var(--text2);
  }

  #timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: var(--gold);
    font-weight: 600;
    background: rgba(245,158,11,0.1);
    padding: 4px 14px;
    border-radius: 6px;
    border: 1px solid rgba(245,158,11,0.25);
    transition: all 0.3s;
  }
  #timer-display.urgent { color: var(--red); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* ── LAYOUT ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  /* ── INTRO SCREEN ── */
  #intro-screen {
    min-height: calc(100vh - 60px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    gap: 2rem;
    padding: 3rem 2rem;
  }

  .intro-title {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.2;
    background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .intro-sub {
    font-size: 1rem;
    color: var(--text2);
    max-width: 500px;
    line-height: 1.8;
  }

  .intro-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 700px;
  }

  .intro-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }
  .intro-stat-value {
    font-size: 1.8rem;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .intro-stat-label { font-size: 0.78rem; color: var(--text3); margin-top: 4px; }

  .topics-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    max-width: 600px;
  }
  .topic-chip {
    font-size: 0.75rem;
    padding: 4px 12px;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.25);
    color: #a5b4fc;
    border-radius: 20px;
  }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 14px 48px;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 0 30px rgba(59,130,246,0.25);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 4px 40px rgba(59,130,246,0.4); }
  .btn-start:active { transform: translateY(0); }

  /* ── EXAM SCREEN ── */
  #exam-screen { display: none; }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .exam-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }
  .exam-count { font-size: 0.85rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .category-badge {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .cat-graph { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
  .cat-combi { background: rgba(245,158,11,0.12); color: #fde68a; border: 1px solid rgba(245,158,11,0.2); }
  .cat-number { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }
  .cat-logic { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
  .cat-set { background: rgba(59,130,246,0.12); color: #93c5fd; border: 1px solid rgba(59,130,246,0.2); }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .question-num {
    font-size: 0.72rem;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.75rem;
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.8;
    margin-bottom: 0.5rem;
  }

  .question-hint {
    font-size: 0.82rem;
    color: var(--text3);
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--border2);
    border-radius: 0 6px 6px 0;
    font-style: italic;
  }

  .math-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin: 1rem 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: #c4b5fd;
    line-height: 1.9;
    white-space: pre-wrap;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    margin-top: 1.5rem;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.9rem 1.25rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .option-btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.06); }
  .option-btn.selected { border-color: var(--accent); background: rgba(59,130,246,0.12); }
  .option-btn.correct { border-color: var(--green); background: rgba(16,185,129,0.12); color: #6ee7b7; }
  .option-btn.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); color: #fca5a5; }
  .option-btn.reveal-correct { border-color: var(--green); background: rgba(16,185,129,0.08); }
  .option-btn:disabled { cursor: default; }

  .option-label {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    background: var(--surface3);
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .selected .option-label { background: var(--accent); color: #fff; }
  .correct .option-label { background: var(--green); color: #fff; }
  .wrong .option-label { background: var(--red); color: #fff; }

  .exam-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  .btn { padding: 10px 28px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.2s; border: none; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-danger { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  /* ── SOLUTION ── */
  .solution-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem;
    margin-top: 1rem;
    animation: fadeSlide 0.3s ease;
  }
  @keyframes fadeSlide { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .solution-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .solution-title { font-weight: 700; font-size: 0.95rem; }
  .answer-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 5px;
    font-weight: 600;
  }
  .answer-badge.correct-ans { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

  .solution-body { font-size: 0.9rem; color: var(--text2); line-height: 1.9; }
  .solution-step {
    display: flex;
    gap: 12px;
    margin-bottom: 1rem;
    padding: 0.9rem 1rem;
    background: var(--surface2);
    border-radius: 8px;
    align-items: flex-start;
  }
  .step-num {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .step-text { flex: 1; font-size: 0.88rem; color: var(--text2); }
  .step-text b { color: var(--text); font-weight: 600; }
  .step-text code { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: #c4b5fd; background: var(--surface3); padding: 1px 5px; border-radius: 3px; }

  .key-formula {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 8px;
    padding: 0.9rem 1.1rem;
    margin: 1rem 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: #c4b5fd;
  }
  .key-formula-label { font-family: 'Noto Sans KR', sans-serif; font-size: 0.72rem; color: var(--text3); margin-bottom: 4px; }

  /* ── RESULT SCREEN ── */
  #result-screen { display: none; padding: 3rem 2rem; text-align: center; }

  .result-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 3px solid transparent;
    background: linear-gradient(var(--surface), var(--surface)) padding-box,
                linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
  }
  .result-score { font-size: 2.4rem; font-weight: 900; font-family: 'JetBrains Mono', monospace; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .result-label { font-size: 0.78rem; color: var(--text3); }

  .result-grade {
    font-size: 1.4rem;
    font-weight: 900;
    margin-bottom: 0.5rem;
  }
  .result-sub { font-size: 0.9rem; color: var(--text2); margin-bottom: 2rem; }

  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    max-width: 700px;
    margin: 0 auto 2rem;
  }
  .breakdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }
  .breakdown-val { font-size: 1.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .breakdown-val.ok { color: var(--green); }
  .breakdown-val.ng { color: var(--red); }
  .breakdown-val.sk { color: var(--gold); }
  .breakdown-key { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

  .review-section { max-width: 800px; margin: 0 auto; text-align: left; }
  .review-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); color: var(--text2); }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .review-icon { font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
  .review-q { font-size: 0.85rem; color: var(--text2); flex: 1; line-height: 1.6; }
  .review-q b { color: var(--text); }

  /* ── QUESTION PALETTE ── */
  .palette-wrap {
    position: fixed;
    right: 1rem;
    top: 80px;
    width: 52px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    z-index: 50;
  }
  .palette-dot {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text3);
  }
  .palette-dot:hover { border-color: var(--accent); color: var(--text); }
  .palette-dot.answered { background: var(--surface3); color: var(--text); border-color: var(--accent); }
  .palette-dot.current { background: var(--accent); color: #fff; border-color: var(--accent); }

  @media (max-width: 768px) {
    .palette-wrap { display: none; }
    .container { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">KOI</span>
    중등부 이산수학 모의고사
  </div>
  <div class="header-meta">
    <span id="timer-display">30:00</span>
    <span id="header-progress" style="display:none; color: var(--text3); font-size:0.8rem;"></span>
  </div>
</header>

<!-- INTRO -->
<div id="intro-screen">
  <div>
    <div style="font-size:0.78rem; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:0.75rem; font-weight:600;">2024 KOI · 한국정보올림피아드 대비</div>
    <h1 class="intro-title">이산수학<br>실전 모의고사</h1>
  </div>
  <p class="intro-sub">그래프 이론, 조합론, 수론, 논리, 집합 등<br>KOI 중등부 핵심 이산수학 유형을 종합한 실전 문제입니다.</p>

  <div class="intro-grid">
    <div class="intro-stat"><div class="intro-stat-value">10</div><div class="intro-stat-label">총 문항 수</div></div>
    <div class="intro-stat"><div class="intro-stat-value">30</div><div class="intro-stat-label">제한 시간(분)</div></div>
    <div class="intro-stat"><div class="intro-stat-value">100</div><div class="intro-stat-label">만점</div></div>
    <div class="intro-stat"><div class="intro-stat-value">5</div><div class="intro-stat-label">출제 영역</div></div>
  </div>

  <div class="topics-list">
    <span class="topic-chip">그래프 이론</span>
    <span class="topic-chip">조합론 · 경우의 수</span>
    <span class="topic-chip">정수론</span>
    <span class="topic-chip">집합과 관계</span>
    <span class="topic-chip">논리와 명제</span>
    <span class="topic-chip">점화식 · 수열</span>
    <span class="topic-chip">포함-배제의 원리</span>
  </div>

  <button class="btn-start" onclick="startExam()">시험 시작하기 →</button>
  <p style="font-size:0.78rem; color:var(--text3);">문제 제출 후 상세한 풀이와 해설을 즉시 확인할 수 있습니다</p>
</div>

<!-- EXAM -->
<div id="exam-screen">
  <div class="container" style="max-width:820px;">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="exam-nav">
      <div class="exam-count" id="exam-count"></div>
      <div id="category-badge" class="category-badge"></div>
    </div>

    <div class="question-card" id="question-card"></div>
    <div id="solution-container"></div>

    <div class="exam-actions">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()">← 이전</button>
      <button class="btn btn-danger" id="btn-skip" onclick="skipQuestion()">건너뛰기</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextOrSubmit()">다음 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="container" style="max-width:820px;">
    <div style="font-size:0.78rem; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:1rem;">결과 분석</div>
    <div class="result-circle">
      <div class="result-score" id="result-score"></div>
      <div class="result-label">/ 100점</div>
    </div>
    <div class="result-grade" id="result-grade"></div>
    <div class="result-sub" id="result-sub"></div>

    <div class="result-breakdown">
      <div class="breakdown-card"><div class="breakdown-val ok" id="r-correct"></div><div class="breakdown-key">정답</div></div>
      <div class="breakdown-card"><div class="breakdown-val ng" id="r-wrong"></div><div class="breakdown-key">오답</div></div>
      <div class="breakdown-card"><div class="breakdown-val sk" id="r-skip"></div><div class="breakdown-key">미응답</div></div>
      <div class="breakdown-card"><div class="breakdown-val" id="r-time" style="color:var(--accent)"></div><div class="breakdown-key">소요 시간</div></div>
    </div>

    <div class="review-section">
      <div class="review-title">오답 · 미응답 풀이 복습</div>
      <div id="review-list"></div>
    </div>

    <div style="display:flex; gap:1rem; justify-content:center; margin-top:2.5rem; flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="reviewAll()">전체 풀이 보기</button>
      <button class="btn btn-primary" onclick="resetExam()">다시 시험보기</button>
    </div>
  </div>
</div>

<!-- QUESTION PALETTE -->
<div class="palette-wrap" id="palette" style="display:none;"></div>

<script>
const QUESTIONS = [
  {
    id: 1,
    category: 'graph',
    categoryLabel: '그래프 이론',
    categoryClass: 'cat-graph',
    question: '꼭짓점이 6개이고 간선이 9개인 단순 연결 그래프에서, 오일러 회로(Euler Circuit)가 존재하기 위한 조건으로 옳은 것은?',
    hint: '오일러 회로는 모든 간선을 정확히 한 번씩 지나 출발점으로 돌아오는 경로입니다.',

let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let skipped = new Array(QUESTIONS.length).fill(false);
let revealed = new Array(QUESTIONS.length).fill(false);
let timerInterval = null;
let timeLeft = 30 * 60;
let startTime = null;

function startExam() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  document.getElementById('palette').style.display = 'flex';
  document.getElementById('header-progress').style.display = 'block';
  startTime = Date.now();
  startTimer();
  renderQuestion();
  renderPalette();
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
    const s = (timeLeft % 60).toString().padStart(2,'0');
    const display = document.getElementById('timer-display');
    display.textContent = `${m}:${s}`;
    if (timeLeft <= 300) display.classList.add('urgent');
    if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById('progress-bar').style.width = `${((currentQ+1)/total)*100}%`;
  document.getElementById('exam-count').textContent = `문제 ${currentQ+1} / ${total}`;
  document.getElementById('header-progress').textContent = `${answers.filter(a=>a!==null).length}/${total} 응답`;

  const badge = document.getElementById('category-badge');
  badge.textContent = q.categoryLabel;
  badge.className = `category-badge ${q.categoryClass}`;

  let html = `<div class="question-num">Q${q.id} · ${q.categoryLabel}</div>
    <div class="question-text">${q.question.replace(/\n/g,'<br>')}</div>`;

  if (q.mathBox) {
    html += `<div class="math-box">${q.mathBox}</div>`;
  }
  if (q.hint) {
    html += `<div class="question-hint">💡 힌트: ${q.hint}</div>`;
  }

  html += `<div class="options-list">`;
  q.options.forEach((opt, i) => {
    let cls = 'option-btn';
    let disabled = '';
    if (revealed[currentQ]) {
      disabled = 'disabled';
      if (i === q.answer) cls += ' reveal-correct';
      if (answers[currentQ] === i && i !== q.answer) cls += ' wrong';
      if (answers[currentQ] === i && i === q.answer) cls = 'option-btn correct';
    } else {
      if (answers[currentQ] === i) cls += ' selected';
    }
    const labels = ['①','②','③','④','⑤'];
    html += `<button class="${cls}" ${disabled} onclick="selectAnswer(${i})">
      <span class="option-label">${labels[i]}</span>
      <span>${opt}</span>
    </button>`;
  });
  html += `</div>`;

  document.getElementById('question-card').innerHTML = html;

  const btn = document.getElementById('btn-next');
  btn.textContent = currentQ === total-1 ? '제출하기' : '다음 →';

  if (revealed[currentQ]) renderSolution();
  else document.getElementById('solution-container').innerHTML = '';

  updatePalette();
}

function selectAnswer(idx) {
  if (revealed[currentQ]) return;
  answers[currentQ] = idx;
  skipped[currentQ] = false;
  renderQuestion();
}

function skipQuestion() {
  skipped[currentQ] = true;
  answers[currentQ] = null;
  nextOrSubmit();
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function nextOrSubmit() {
  if (currentQ === QUESTIONS.length - 1) {
    submitExam();
  } else {
    currentQ++;
    renderQuestion();
  }
}

function renderSolution() {
  const q = QUESTIONS[currentQ];
  const sol = q.solution;
  const isCorrect = answers[currentQ] === q.answer;
  const isSkipped = answers[currentQ] === null;

  let icon = isSkipped ? '⬜ 미응답' : (isCorrect ? '✅ 정답' : '❌ 오답');
  let html = `<div class="solution-panel">
    <div class="solution-header">
      <span>${icon}</span>
      <span class="solution-title">풀이 및 해설</span>
      <span class="answer-badge correct-ans">정답: ${sol.correct}</span>
    </div>
    <div class="solution-body">`;

  sol.steps.forEach((step, i) => {
    html += `<div class="solution-step">
      <div class="step-num">${i+1}</div>
      <div class="step-text">${step.text.replace(/\n/g,'<br>')}</div>
    </div>`;
  });

  if (sol.formula) {
    html += `<div class="key-formula">
      <div class="key-formula-label">핵심 공식 / 정리</div>
      ${sol.formula.replace(/\n/g,'<br>')}
    </div>`;
  }

  html += `</div></div>`;
  document.getElementById('solution-container').innerHTML = html;
}

function revealSolution() {
  revealed[currentQ] = true;
  renderQuestion();
  renderSolution();
}

function submitExam() {
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const em = Math.floor(elapsed/60).toString().padStart(2,'0');
  const es = (elapsed%60).toString().padStart(2,'0');

  let correct = 0, wrong = 0, skip = 0;
  QUESTIONS.forEach((q, i) => {
    if (answers[i] === q.answer) correct++;
    else if (answers[i] === null) skip++;
    else wrong++;
  });

  const score = correct * 10;

  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('palette').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  document.getElementById('result-score').textContent = score;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skip;
  document.getElementById('r-time').textContent = `${em}:${es}`;

  let grade, sub;
  if (score >= 90) { grade = '🏆 최우수 — 금상 수준'; sub = '이산수학 전 영역에 걸친 탁월한 이해력을 보여주었습니다.'; }
  else if (score >= 70) { grade = '🥈 우수 — 은상 수준'; sub = '핵심 개념을 잘 이해하고 있습니다. 오답 영역을 집중 보완하세요.'; }
  else if (score >= 50) { grade = '🥉 보통 — 동상 수준'; sub = '기초는 갖추어졌습니다. 공식 암기보다 원리 이해에 집중하세요.'; }
  else { grade = '📘 기초 다지기 필요'; sub = '이산수학 기본 개념부터 체계적으로 학습하는 것을 권장합니다.'; }

  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-sub').textContent = sub;

  const reviewList = document.getElementById('review-list');
  let reviewHtml = '';
  QUESTIONS.forEach((q, i) => {
    if (answers[i] !== q.answer) {
      const icon = answers[i] === null ? '⬜' : '❌';
      reviewHtml += `<div class="review-item">
        <div class="review-icon">${icon}</div>
        <div class="review-q">
          <b>Q${q.id} [${q.categoryLabel}]</b><br>
          ${q.question.slice(0,60)}...<br>
          <span style="color:var(--green); font-size:0.8rem;">정답: ${q.solution.correct}</span>
        </div>
      </div>`;
    }
  });
  reviewList.innerHTML = reviewHtml || '<div style="color:var(--text3); font-size:0.9rem; text-align:center; padding:1rem;">모든 문제를 맞혔습니다! 🎉</div>';
}

function reviewAll() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  document.getElementById('palette').style.display = 'flex';
  for (let i = 0; i < QUESTIONS.length; i++) revealed[i] = true;
  currentQ = 0;
  renderQuestion();
  renderPalette();
}

function resetExam() {
  answers = new Array(QUESTIONS.length).fill(null);
  skipped = new Array(QUESTIONS.length).fill(false);
  revealed = new Array(QUESTIONS.length).fill(false);
  currentQ = 0;
  timeLeft = 30 * 60;
  clearInterval(timerInterval);
  document.getElementById('timer-display').textContent = '30:00';
  document.getElementById('timer-display').classList.remove('urgent');
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('intro-screen').style.display = 'flex';
  document.getElementById('palette').style.display = 'none';
  document.getElementById('header-progress').style.display = 'none';
}

function renderPalette() {
  const palette = document.getElementById('palette');
  let html = '';
  QUESTIONS.forEach((q, i) => {
    let cls = 'palette-dot';
    if (i === currentQ) cls += ' current';
    else if (answers[i] !== null) cls += ' answered';
    html += `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  });
  palette.innerHTML = html;
}

function updatePalette() {
  const dots = document.querySelectorAll('.palette-dot');
  dots.forEach((dot, i) => {
    dot.className = 'palette-dot';
    if (i === currentQ) dot.classList.add('current');
    else if (answers[i] !== null) dot.classList.add('answered');
  });
}

function goTo(idx) {
  currentQ = idx;
  renderQuestion();
  updatePalette();
}
</script>
</body>
</html>
