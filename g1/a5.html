<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOI 모의고사 — 정답 및 해설집</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap');

:root {
  --bg: #faf9f6;
  --surface: #ffffff;
  --surface2: #f2f0ea;
  --border: #e0dbd0;
  --ink: #1c1917;
  --muted: #78716c;
  --faint: #a8a29e;
  --red: #be123c;
  --blue: #1d4ed8;
  --green: #15803d;
  --amber: #b45309;
  --purple: #7e22ce;
  --teal: #0f766e;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  line-height: 1.7;
}

/* ── NOISE TEXTURE ── */
body::after {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:999;
  opacity:.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.site-header {
  background: var(--ink);
  color: #fff;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 3px solid var(--red);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-brand {
  display: flex;
  flex-direction: column;
}
.header-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(255,255,255,.4);
  text-transform: uppercase;
}
.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  line-height: 1;
  color: #fff;
}
.header-title em {
  font-style: italic;
  color: #fca5a5;
}

.header-score-strip {
  display: flex;
  gap: 20px;
}
.hscore-item {
  text-align: center;
}
.hscore-n {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: #fff;
  display: block;
  line-height: 1;
}
.hscore-l {
  font-size: 10px;
  color: rgba(255,255,255,.35);
  letter-spacing: 1px;
}

/* ── PROGRESS BAR ── */
.progress-nav {
  background: rgba(255,255,255,.06);
  border-top: 1px solid rgba(255,255,255,.08);
  padding: 8px 28px;
  display: flex;
  gap: 4px;
  max-width: 1100px;
  margin: 0 auto;
  flex-wrap: wrap;
}
.pnav-btn {
  width: 32px; height: 32px;
  border: none;
  background: rgba(255,255,255,.1);
  color: rgba(255,255,255,.5);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  border-radius: 3px;
  transition: all .15s;
  flex-shrink: 0;
}
.pnav-btn:hover { background: rgba(255,255,255,.25); color: #fff; }
.pnav-btn.active { background: var(--red); color: #fff; }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.layout {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 28px 100px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 32px;
  align-items: start;
}

/* ── SIDEBAR ── */
.sidebar {
  position: sticky;
  top: 130px;
}

.sidebar-card {
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
  overflow: hidden;
}

.sidebar-card-head {
  background: var(--ink);
  color: #fff;
  padding: 10px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
}
.sum-cell {
  background: var(--surface);
  padding: 14px 12px;
  text-align: center;
}
.sum-n {
  font-family: 'DM Mono', monospace;
  font-size: 24px;
  font-weight: 500;
  display: block;
  line-height: 1;
}
.sum-l { font-size: 10px; color: var(--muted); margin-top: 3px; }

.toc-list {
  list-style: none;
}
.toc-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.toc-item:last-child { border-bottom: none; }
.toc-item:hover { background: var(--surface2); }
.toc-item.active { background: #fef2f2; }
.toc-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--faint);
  min-width: 24px;
}
.toc-title {
  font-size: 12px;
  flex: 1;
  line-height: 1.3;
}
.toc-pts {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--faint);
}
.toc-cat-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  color: #fff;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

/* ── CAT COLORS ── */
.cat-수론 { background: var(--amber); }
.cat-확률 { background: var(--purple); }
.cat-논리 { background: var(--blue); }
.cat-알고 { background: var(--red); }
.cat-조합 { background: var(--teal); }
.cat-집합 { background: #0369a1; }
.cat-그래 { background: #6d28d9; }
.cat-진법 { background: #0e7490; }
.cat-점화 { background: #b45309; }
.cat-불변 { background: #166534; }
.cat-재귀 { background: var(--red); }
.cat-BFS { background: #1e40af; }
.cat-DP { background: #7c3aed; }
.cat-etc { background: var(--muted); }

/* ══════════════════════════════════════
   QUESTION CARDS
══════════════════════════════════════ */
.q-feed {
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  scroll-margin-top: 140px;
  transition: box-shadow .2s;
}
.q-card:hover { box-shadow: var(--shadow-md); }

/* card header stripe */
.q-stripe {
  height: 4px;
  background: var(--blue);
}
.q-stripe.s-red    { background: var(--red); }
.q-stripe.s-green  { background: var(--green); }
.q-stripe.s-amber  { background: var(--amber); }
.q-stripe.s-purple { background: var(--purple); }
.q-stripe.s-teal   { background: var(--teal); }
.q-stripe.s-blue   { background: var(--blue); }

.q-head {
  padding: 20px 28px 14px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  border-bottom: 1px solid var(--border);
}

.q-num-badge {
  font-family: 'DM Serif Display', serif;
  font-size: 40px;
  line-height: 1;
  color: var(--border);
  min-width: 52px;
}

.q-meta { flex: 1; }
.q-cat-tag {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.q-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  line-height: 1.2;
  color: var(--ink);
}

.q-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.q-pts-badge {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--red);
  border: 1.5px solid var(--red);
  padding: 3px 10px;
}
.answer-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #f0fdf4;
  border: 1.5px solid var(--green);
  padding: 5px 12px;
}
.answer-pill-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.answer-pill-val {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--green);
}

/* ── QUESTION BODY ── */
.q-body-section {
  padding: 20px 28px;
  border-bottom: 1px dashed var(--border);
  font-size: 14px;
  line-height: 1.9;
}
.q-body-section p { margin-bottom: 8px; }
.q-body-section p:last-child { margin-bottom: 0; }
.q-body-section strong { color: var(--blue); }
.q-body-section .hl { color: var(--red); font-weight: 700; }
.q-body-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--faint);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.code-box {
  font-family: 'DM Mono', monospace;
  background: #f8f7f4;
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  padding: 12px 16px;
  margin: 10px 0;
  font-size: 12.5px;
  line-height: 1.75;
  overflow-x: auto;
  white-space: pre;
  color: var(--ink);
}

.info-box {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-left: 3px solid var(--amber);
  padding: 10px 14px;
  margin: 10px 0;
  font-size: 13px;
  line-height: 1.7;
}

/* ── OPTIONS LIST ── */
.opts-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 16px 28px;
  border-bottom: 1px dashed var(--border);
}
.opt-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  font-size: 13px;
  transition: all .15s;
}
.opt-row.correct {
  border-color: var(--green);
  background: #f0fdf4;
}
.opt-num {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--faint);
  min-width: 20px;
}
.opt-row.correct .opt-num { color: var(--green); font-weight: 700; }
.opt-check { font-size: 14px; margin-left: auto; }

/* ── EXPLANATION ── */
.expl-section {
  padding: 24px 28px;
  background: var(--surface);
}

.expl-head-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--ink);
}
.expl-icon-box {
  width: 32px; height: 32px;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.expl-head-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink);
  font-weight: 500;
}
.expl-pts-earned {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.expl-body {
  font-size: 14px;
  line-height: 1.95;
  color: #3c3836;
}
.expl-body p { margin-bottom: 10px; }
.expl-body p:last-child { margin-bottom: 0; }
.expl-body strong { color: var(--blue); }

.math-step {
  font-family: 'DM Mono', monospace;
  background: #fafaf8;
  border: 1px solid var(--border);
  border-left: 4px solid var(--ink);
  padding: 16px 20px;
  margin: 12px 0;
  font-size: 12.5px;
  line-height: 1.85;
  white-space: pre-wrap;
  overflow-x: auto;
}

.key-concept {
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-left: 4px solid var(--blue);
  padding: 12px 16px;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.7;
}
.key-concept-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--blue);
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* mini-grid (minesweeper) */
.grid-wrap { margin: 12px 0; overflow-x: auto; }
.mini-grid { border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 13px; }
.mini-grid td {
  border: 2px solid var(--ink); width: 40px; height: 40px;
  text-align: center; vertical-align: middle; font-weight: 700;
}
.mini-grid td.empty { background: #e7e5e0; color: var(--muted); }
.mini-grid td.num0 { color: var(--faint); }
.mini-grid td.num1 { color: #1d4ed8; }
.mini-grid td.num2 { color: #15803d; }
.mini-grid td.num3 { color: #be123c; }

/* ── ANSWER DIVIDER ── */
.answer-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 16px 0;
}
.answer-divider::before, .answer-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.answer-divider-text {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--faint);
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── TIPS BOX ── */
.tip-box {
  background: #fdf4ff;
  border: 1px solid #e9d5ff;
  border-left: 4px solid var(--purple);
  padding: 12px 16px;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.7;
}
.tip-box-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--purple);
  text-transform: uppercase;
  margin-bottom: 4px;
}

/* ── ANSWER TABLE (big summary) ── */
.answer-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  margin-bottom: 32px;
  overflow: hidden;
}
.at-head {
  background: var(--ink);
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.at-head-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.at-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--border);
}
.at-cell {
  background: var(--surface);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: background .15s;
}
.at-cell:hover { background: var(--surface2); }
.at-qnum {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--faint);
  display: block;
  margin-bottom: 4px;
}
.at-ans {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--green);
  display: block;
  line-height: 1;
}
.at-pts {
  font-size: 10px;
  color: var(--faint);
  margin-top: 3px;
  display: block;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .header-score-strip { display: none; }
}

@media (max-width: 600px) {
  .at-grid { grid-template-columns: repeat(4, 1fr); }
  .q-head { flex-direction: column; gap: 10px; }
  .q-num-badge { font-size: 28px; }
  .expl-section, .q-body-section { padding: 16px; }
  .opts-list { padding: 12px 16px; }
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="site-header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="header-eyebrow">Korea Informatics Olympiad — 창작 모의고사</span>
      <div class="header-title">정답 및 <em>상세 해설집</em></div>
    </div>
    <div class="header-score-strip">
      <div class="hscore-item">
        <span class="hscore-n">20</span>
        <span class="hscore-l">총 문항</span>
      </div>
      <div class="hscore-item">
        <span class="hscore-n">200</span>
        <span class="hscore-l">총 배점</span>
      </div>
      <div class="hscore-item">
        <span class="hscore-n">90</span>
        <span class="hscore-l">제한(분)</span>
      </div>
    </div>
  </div>
  <div style="max-width:1100px; margin:0 auto;">
    <div class="progress-nav" id="pnav"></div>
  </div>
</div>

<!-- ══ LAYOUT ══ -->
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <!-- 정답 한눈에 -->
    <div class="sidebar-card">
      <div class="sidebar-card-head">📋 정답 한눈에 보기</div>
      <div class="at-grid" id="answer-grid"></div>
    </div>

    <!-- 영역별 -->
    <div class="sidebar-card">
      <div class="sidebar-card-head">🗂 문제 목록</div>
      <ul class="toc-list" id="toc"></ul>
    </div>

  </aside>

  <!-- ── MAIN FEED ── -->
  <main>
    <div class="q-feed" id="feed"></div>
  </main>

</div>

<script>
// ═══════════════════════════════════════════════════
//  DATA — 20문제 완전 해설
// ═══════════════════════════════════════════════════
const QS = [
  {
    id:1, pts:9, cat:"수론·정수", title:"나머지 계산",
    color:"s-amber",
    answer:"② 2",
    ansShort:"2",
    opts:["1","2","3","4","5"], ans:1,
    body: `<p>p가 소수이고 a가 p의 배수가 아닌 정수일 때, <strong>페르마의 소정리</strong>에 의해 a<sup>p−1</sup>을 p로 나눈 나머지는 1이다.</p>
           <p>위 정리를 이용하여 다음 값을 구하시오.</p>
           <div class="code-box">3²⁰²⁴ 을 7로 나눈 나머지</div>`,
    concept: { title:"페르마의 소정리", body:"p가 소수이고 gcd(a,p)=1이면, a<sup>p−1</sup> ≡ 1 (mod p). 이를 이용해 큰 지수를 (p−1)로 나눈 나머지로 환원합니다." },
    expl: `<p><strong>Step 1.</strong> 페르마의 소정리 적용</p>
<div class="math-step">7은 소수, 3과 7은 서로소 (gcd=1)
∴  3^6 ≡ 1 (mod 7)</div>
<p><strong>Step 2.</strong> 지수 2024를 6으로 나누기</p>
<div class="math-step">2024 ÷ 6 = 337 나머지 2
∴  2024 = 6 × 337 + 2</div>
<p><strong>Step 3.</strong> 나머지 계산</p>
<div class="math-step">3^2024 = 3^(6×337 + 2)
       = (3^6)^337 × 3^2
       ≡ 1^337    × 9     (mod 7)
       ≡ 9                (mod 7)
       ≡ 2                (mod 7)   ← 9 = 7 + 2</div>`,
    tip: { title:"암기 포인트", body:"페르마 소정리: a^(p-1) ≡ 1 (mod p). 지수를 (p-1)로 나눈 <em>나머지</em>만 남긴다." }
  },

  {
    id:2, pts:9, cat:"확률", title:"주사위 확률",
    color:"s-purple",
    answer:"③ 5/12",
    ansShort:"5/12",
    opts:["5/18","7/18","5/12","7/36","15/36"], ans:2,
    body:`<p>두 개의 주사위를 동시에 던진다.</p>
          <p><strong>두 눈의 합이 8 이상</strong>이 될 확률은 얼마인가?</p>
          <div class="info-box">주사위는 공정하며, 각 면이 1~6의 숫자를 가진다.</div>`,
    concept: { title:"경우의 수 세기", body:"두 주사위의 전체 경우 = 6×6 = 36. 조건을 만족하는 경우를 합의 값별로 나열합니다." },
    expl:`<p><strong>Step 1.</strong> 합이 8 이상인 경우 나열</p>
<div class="math-step">합 = 8 : (2,6)(3,5)(4,4)(5,3)(6,2)          → 5가지

        <div class="q-pts-badge">+${q.pts}점</div>
        <div class="answer-pill">
          <span class="answer-pill-label">정답</span>
          <span class="answer-pill-val">${q.type==='short' ? q.correct : lbls[q.ans]}</span>
        </div>
      </div>
    </div>

    <div class="q-body-section">
      <div class="q-body-label">▸ 문제</div>
      ${q.body}
    </div>

    ${optsHTML}

    <div class="expl-section">
      <div class="expl-head-row">
        <div class="expl-icon-box">💡</div>
        <span class="expl-head-title">상세 풀이 및 해설</span>
        <span class="expl-pts-earned">배점 ${q.pts}점</span>
      </div>
      <div class="expl-body">
        ${conceptHTML}
        <div class="answer-divider"><span class="answer-divider-text">풀이 과정</span></div>
        ${q.expl}
        ${tipHTML}
      </div>
    </div>`;

  feed.appendChild(card);
});

// ── INTERSECTION OBSERVER (active highlight) ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && entry.intersectionRatio > 0.2) {
      const i = parseInt(entry.target.id.replace('q',''));
      // Update nav
      document.querySelectorAll('.pnav-btn').forEach((b,j) => {
        b.classList.toggle('active', j === i);
      });
      // Update toc
      document.querySelectorAll('.toc-item').forEach((t,j) => {
        t.classList.toggle('active', j === i);
      });
    }
  });
}, { threshold: 0.2, rootMargin: '-100px 0px -60% 0px' });

document.querySelectorAll('.q-card').forEach(el => observer.observe(el));
</script>
</body>
</html>
