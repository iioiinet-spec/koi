<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOI 중등부 모의고사 — 창작 문제집</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

:root {
  --ink: #0f0f14;
  --paper: #f5f2eb;
  --paper2: #ede9df;
  --line: #c8c2b4;
  --accent: #c0392b;
  --accent2: #2c3e7a;
  --accent3: #1a7a4a;
  --gold: #b8860b;
  --text: #1a1a24;
  --muted: #6b6560;
  --correct-bg: #e8f5ee;
  --correct-border: #1a7a4a;
  --wrong-bg: #fdecea;
  --wrong-border: #c0392b;
  --shadow: 4px 4px 0px #c8c2b4;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}

/* ── PAPER TEXTURE ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 27px,
    rgba(0,0,0,0.04) 27px, rgba(0,0,0,0.04) 28px
  );
  pointer-events:none; z-index:0;
}

/* ══════════════ SPLASH ══════════════ */
#splash {
  position:fixed; inset:0; z-index:200;
  background: var(--ink);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:0;
  transition: opacity .7s, visibility .7s;
  overflow: hidden;
}
#splash.gone { opacity:0; visibility:hidden; }

.splash-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 60px 60px;
}

.splash-inner {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center; gap:20px;
  max-width:600px; width:90%; text-align:center;
}

.splash-tag {
  font-family:'Space Mono', monospace;
  font-size:11px; letter-spacing:4px;
  color:rgba(255,255,255,.4);
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,.15);
  padding:6px 18px;
}

.splash-h1 {
  font-family:'Syne', sans-serif;
  font-size:clamp(52px,10vw,100px);
  font-weight:800; line-height:.95;
  color:#fff;
  letter-spacing:-2px;
}
.splash-h1 em {
  font-style:normal;
  color: var(--accent);
}

.splash-desc {
  font-size:14px; color:rgba(255,255,255,.5);
  line-height:1.7; max-width:380px;
}

.splash-chips {
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
}
.splash-chip {
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  padding:8px 20px;
  font-family:'Space Mono', monospace;
  font-size:13px; color:#fff;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.splash-chip span { font-size:10px; color:rgba(255,255,255,.4); letter-spacing:2px; }

.btn-go {
  margin-top:8px;
  padding:16px 56px;
  background:var(--accent);
  border:none; color:#fff;
  font-family:'Syne', sans-serif;
  font-size:16px; font-weight:700;
  letter-spacing:1px; cursor:pointer;
  position:relative; overflow:hidden;
  transition: transform .2s, box-shadow .2s;
}
.btn-go::after {
  content:'';
  position:absolute; inset:0;
  background:rgba(255,255,255,.15);
  transform: translateX(-100%);
  transition: transform .3s;
}
.btn-go:hover::after { transform:translateX(0); }
.btn-go:hover { transform:translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,.4); }

/* ══════════════ HEADER ══════════════ */
#hdr {
  display:none;
  position:sticky; top:0; z-index:50;
  background:var(--ink);
  border-bottom:3px solid var(--accent);
  padding:10px 24px;
  align-items:center; justify-content:space-between;
}
.hdr-brand {
  font-family:'Syne', sans-serif;
  font-size:18px; font-weight:800;
  color:#fff; letter-spacing:-1px;
}
.hdr-brand em { color:var(--accent); font-style:normal; }

.hdr-dots {
  display:flex; gap:3px; align-items:center; flex-wrap:wrap;
  max-width:400px;
}
.hdot {
  width:12px; height:12px;
  background:rgba(255,255,255,.15);
  cursor:pointer; transition:all .2s;
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}
.hdot.answered { background:rgba(255,255,255,.5); }
.hdot.current  { background:var(--accent); transform:scale(1.4); }
.hdot.ok       { background:#1a7a4a; }
.hdot.bad      { background:#c0392b; }

.hdr-right { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
#tmr {
  font-family:'Space Mono', monospace;
  font-size:22px; font-weight:700; color:#fff;
}
#tmr.warn { color:#e74c3c; animation:blink .8s step-end infinite; }
@keyframes blink { 50%{opacity:.3} }
.hdr-pts {
  font-family:'Space Mono', monospace;
  font-size:11px; color:rgba(255,255,255,.4);
}

/* progress */
#pbar { display:none; height:4px; background:rgba(0,0,0,.1); }
#pfill { height:100%; background:var(--accent); transition:width .4s; }

/* ══════════════ MAIN ══════════════ */
#app {
  display:none; position:relative; z-index:1;
  max-width:820px; margin:0 auto;
  padding:36px 20px 140px;
}

/* ── QUESTION CARD ── */
.qcard { display:none; animation:up .35s ease; }
.qcard.on { display:block; }
@keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.qcard-top {
  display:flex; align-items:flex-start;
  justify-content:space-between; margin-bottom:20px;
}
.qnum {
  font-family:'Syne', sans-serif;
  font-size:72px; font-weight:800; line-height:1;
  color:var(--line);
}
.qmeta { display:flex; flex-direction:column; gap:4px; }
.qcat {
  font-family:'Space Mono', monospace;
  font-size:10px; letter-spacing:3px;
  color:var(--muted); text-transform:uppercase;
}
.qtitle {
  font-size:16px; font-weight:700; color:var(--text);
}
.qpts {
  font-family:'Space Mono', monospace;
  font-size:13px; color:var(--accent);
  border:2px solid var(--accent);
  padding:4px 14px; align-self:flex-start;
}

/* body */
.qbody {
  background:#fff;
  border:2px solid var(--ink);
  box-shadow: var(--shadow);
  padding:28px 32px;
  margin-bottom:20px;
  font-size:15px; line-height:1.95;
  position:relative;
}
.qbody::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0;
  width:5px; background:var(--accent2);
}

.qbody p { margin-bottom:10px; }
.qbody p:last-child { margin-bottom:0; }
.qbody strong { color:var(--accent2); }
.qbody .hl { color:var(--accent); font-weight:700; }

.code-box {
  font-family:'Space Mono', monospace;
  background:#f0ede6;
  border:1px solid var(--line);
  border-left:4px solid var(--accent2);
  padding:14px 18px;
  margin:12px 0;
  font-size:13px; line-height:1.7;
  overflow-x:auto;
  white-space:pre;
}

.info-box {
  background:#f7f4ed;
  border:1px solid var(--line);
  padding:12px 18px;
  margin:12px 0;
  font-size:14px;
}

/* grid/table */
.grid-wrap {
  margin:14px 0; overflow-x:auto;
}
.mini-grid {
  border-collapse:collapse;
  font-family:'Space Mono', monospace;
  font-size:13px;
}
.mini-grid td {
  border:2px solid var(--ink);
  width:42px; height:42px;
  text-align:center; vertical-align:middle;
  font-weight:700;
}
.mini-grid td.empty { background:#e8e4db; color:var(--muted); }
.mini-grid td.labeled { background:var(--accent2); color:#fff; font-size:11px; }
.mini-grid td.mine { background:var(--ink); color:#fff; }
.mini-grid td.num0 { color:var(--muted); }
.mini-grid td.num1 { color:#2980b9; }
.mini-grid td.num2 { color:#27ae60; }
.mini-grid td.num3 { color:#c0392b; }
.mini-grid td.num4 { color:#8e44ad; }
.mini-grid td.num5 { color:#e67e22; }

/* options */
.opts { display:flex; flex-direction:column; gap:8px; margin-bottom:22px; }

.opt {
  background:#fff;
  border:2px solid var(--line);
  padding:13px 18px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:all .2s;
  position:relative; overflow:hidden;
  font-size:14px;
}
.opt::after {
  content:'';
  position:absolute; left:0; top:0; bottom:0;
  width:0; background:var(--accent2);
  opacity:.08; transition:width .25s;
}
.opt:hover { border-color:var(--accent2); }
.opt:hover::after { width:100%; }

.opt.sel { border-color:var(--accent2); background:#eef1fc; }
.opt.ok  { border-color:var(--accent3)!important; background:var(--correct-bg)!important; }
.opt.bad { border-color:var(--accent)!important; background:var(--wrong-bg)!important; }
.opt.disabled { pointer-events:none; }

.opt-lbl {
  font-family:'Space Mono', monospace;
  font-size:12px; font-weight:700;
  color:var(--muted); min-width:22px;
}
.opt.sel .opt-lbl { color:var(--accent2); }
.opt.ok  .opt-lbl { color:var(--accent3); }
.opt.bad .opt-lbl { color:var(--accent); }

/* short answer */
.sa-wrap { margin-bottom:22px; }
.sa-label { font-size:12px; color:var(--muted); margin-bottom:6px; letter-spacing:.5px; }
.sa-input {
  width:100%; border:2px solid var(--line);
  background:#fff; color:var(--text);
  padding:13px 16px;
  font-family:'Space Mono', monospace;
  font-size:18px; font-weight:700;
  outline:none; transition:border .2s;
}
.sa-input:focus { border-color:var(--accent2); }
.sa-input.ok  { border-color:var(--accent3); background:var(--correct-bg); }
.sa-input.bad { border-color:var(--accent);  background:var(--wrong-bg); }
.sa-input:disabled { opacity:.7; cursor:not-allowed; }

/* explanation */
.expl {
  display:none;
  border:2px solid var(--ink);
  box-shadow:var(--shadow);
  margin-bottom:22px;
  animation:fadein .4s ease;
}
.expl.on { display:block; }
@keyframes fadein { from{opacity:0} to{opacity:1} }

.expl-head {
  background:var(--ink); color:#fff;
  padding:12px 20px;
  display:flex; align-items:center; gap:10px;
}
.expl-icon { font-size:16px; }
.expl-title {
  font-family:'Space Mono', monospace;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
}
.verdict-ok  { margin-left:auto; color:#4ade80; font-weight:700; font-size:14px; }
.verdict-bad { margin-left:auto; color:#f87171; font-weight:700; font-size:14px; }

.expl-body {
  background:#fff; padding:22px 24px;
  font-size:14px; line-height:1.9; color:#444;
}
.expl-body strong { color:var(--accent2); }
.answer-chip {
  display:inline-block;
  background:var(--accent3); color:#fff;
  font-family:'Space Mono', monospace;
  font-size:12px; padding:4px 14px;
  margin-bottom:12px;
}
.math-step {
  font-family:'Space Mono', monospace;
  background:#f0ede6;
  border-left:4px solid var(--accent2);
  padding:12px 16px; margin:10px 0;
  font-size:13px; line-height:1.8;
  white-space:pre-wrap;
}

/* nav */
.nav-row {
  display:flex; align-items:center;
  justify-content:space-between; gap:10px;
}
.btn {
  padding:12px 26px; border:2px solid var(--ink);
  background:#fff; color:var(--ink);
  font-family:'Space Mono', monospace;
  font-size:13px; cursor:pointer; transition:all .2s;
  font-weight:700;
}
.btn:hover { background:var(--ink); color:#fff; }
.btn:disabled { opacity:.3; cursor:not-allowed; }
.btn:disabled:hover { background:#fff; color:var(--ink); }

.btn-submit {
  background:var(--accent2); color:#fff;
  border-color:var(--accent2);
}
.btn-submit:hover { background:#1e2d66; border-color:#1e2d66; }
.btn-submit:disabled { opacity:.3; cursor:not-allowed; }

.btn-end {
  background:var(--accent3); color:#fff;
  border-color:var(--accent3);
}
.btn-end:hover { background:#145c38; border-color:#145c38; }

/* ══════════════ RESULT ══════════════ */
#result {
  display:none; position:fixed; inset:0; z-index:100;
  background:var(--paper); overflow-y:auto;
  animation:up .5s ease;
}
#result.on { display:block; }

.res-inner {
  max-width:720px; margin:0 auto;
  padding:60px 20px 120px;
}

.res-hero {
  text-align:center; margin-bottom:48px;
  border-bottom:2px solid var(--line); padding-bottom:40px;
}
.res-label {
  font-family:'Space Mono', monospace;
  font-size:11px; letter-spacing:4px;
  color:var(--muted); text-transform:uppercase; margin-bottom:16px;
}
.res-score {
  font-family:'Syne', sans-serif;
  font-size:clamp(64px,15vw,120px);
  font-weight:800; line-height:1;
  color:var(--accent);
}
.res-denom {
  font-family:'Space Mono', monospace;
  font-size:18px; color:var(--muted);
}
.res-grade {
  margin-top:12px;
  font-family:'Syne', sans-serif;
  font-size:22px; font-weight:700;
}

.res-stats {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:12px; margin-bottom:40px;
}
.scard {
  border:2px solid var(--ink);
  background:#fff;
  box-shadow: 3px 3px 0 var(--line);
  padding:20px 12px; text-align:center;
}
.scard-n {
  font-family:'Syne', sans-serif;
  font-size:36px; font-weight:800; line-height:1;
}
.scard-l { font-size:12px; color:var(--muted); margin-top:4px; }

.review-hdr {
  font-family:'Space Mono', monospace;
  font-size:10px; letter-spacing:3px;
  color:var(--muted); text-transform:uppercase;
  border-top:2px solid var(--ink);
  padding-top:16px; margin-bottom:14px;
}
.rev-list { display:flex; flex-direction:column; gap:6px; margin-bottom:40px; }
.rev-item {
  display:flex; align-items:center; gap:12px;
  border:2px solid var(--line); background:#fff;
  padding:11px 16px; cursor:pointer;
  transition:border-color .2s;
}
.rev-item:hover { border-color:var(--ink); }
.rev-item.ri-ok { border-left:5px solid var(--accent3); }
.rev-item.ri-bad { border-left:5px solid var(--accent); }
.rev-n {
  font-family:'Space Mono', monospace;
  font-size:11px; color:var(--muted); min-width:56px;
}
.rev-t { font-size:13px; flex:1; }
.rev-mark { font-size:18px; }

.btn-restart {
  display:block; width:100%;
  padding:18px; background:var(--ink); color:#fff;
  border:none; font-family:'Syne', sans-serif;
  font-size:16px; font-weight:700; cursor:pointer;
  transition: transform .2s, box-shadow .2s;
}
.btn-restart:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.3); }

/* ══════════════ RESPONSIVE ══════════════ */
@media(max-width:600px) {
  .hdr-dots { display:none; }
  .res-stats { grid-template-columns:1fr 1fr; }
  .qbody { padding:20px 18px; }
}
</style>
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash">
  <div class="splash-grid"></div>
  <div class="splash-inner">
    <div class="splash-tag">Korea Informatics Olympiad — 창작 모의고사</div>
    <div class="splash-h1">KOI<br><em>MOCK</em></div>
    <p class="splash-desc">
      2020 KOI 중등부 기출을 분석하여 출제한 동일 난이도 창작 문제입니다.<br>
      수학적 사고력 · 알고리즘 · 논리 추론 · 확률 영역을 골고루 다룹니다.
    </p>
    <div class="splash-chips">
      <div class="splash-chip">20<span>총 문항</span></div>
      <div class="splash-chip">200<span>총 점수</span></div>
      <div class="splash-chip">90<span>제한(분)</span></div>
    </div>
    <button class="btn-go" onclick="startExam()">▶ 시험 시작</button>
  </div>
</div>

<!-- ── HEADER ── -->
<header id="hdr">
  <div class="hdr-brand">KOI <em>MOCK</em></div>
  <div class="hdr-dots" id="dots"></div>
  <div class="hdr-right">
    <div id="tmr">90:00</div>
    <div class="hdr-pts" id="hpts">0 / 200점</div>
  </div>
</header>
<div id="pbar"><div id="pfill"></div></div>

<!-- ── APP ── -->
<div id="app"></div>

<!-- ── RESULT ── -->
<div id="result">
  <div class="res-inner">
    <div class="res-hero">
      <div class="res-label">최종 결과</div>
      <div class="res-score" id="rscore">0</div>
      <div class="res-denom">/ 200점</div>
      <div class="res-grade" id="rgrade"></div>
    </div>
    <div class="res-stats">
      <div class="scard"><div class="scard-n" id="rn-ok" style="color:var(--accent3)">0</div><div class="scard-l">정답</div></div>
      <div class="scard"><div class="scard-n" id="rn-bad" style="color:var(--accent)">0</div><div class="scard-l">오답</div></div>
      <div class="scard"><div class="scard-n" id="rn-time" style="color:var(--accent2)">--</div><div class="scard-l">소요시간</div></div>
    </div>
    <div class="review-hdr">문항별 결과</div>
    <div class="rev-list" id="rlist"></div>
    <button class="btn-restart" onclick="restartExam()">↺ 다시 풀기</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  문제 데이터 (20문제, 200점)
// ═══════════════════════════════════════
const QS = [
  // ────────── 01 페르마의 소정리 유사 ──────────
  {
    id:1, pts:9, cat:"수론·정수", title:"나머지 계산",
    type:"mcq",
    body:`<p>p가 소수이고 a가 p의 배수가 아닌 정수일 때, <strong>페르마의 소정리</strong>에 의해 a<sup>p-1</sup>을 p로 나눈 나머지는 1이다.</p>
<p>위 정리를 이용하여 다음 값을 구하시오.</p>
<div class="code-box">3²⁰²⁴ 을 7로 나눈 나머지</div>`,
    opts:["1","2","3","4","5"],
    ans:0,
    expl:`<p><strong>페르마의 소정리 적용:</strong></p>
<div class="math-step">7은 소수, 3은 7의 배수가 아님
→ 3^(7-1) = 3^6 ≡ 1 (mod 7)

2024를 6으로 나누기:
2024 = 6 × 337 + 2
→ 2024 mod 6 = 2

따라서:
3^2024 = 3^(6×337 + 2) = (3^6)^337 × 3^2
        ≡ 1^337 × 9 ≡ 9 ≡ 2 (mod 7)</div>
<p>정답: <strong>2</strong></p>`
  },

  // ────────── 02 확률 (가위바위보 유사) ──────────
  {
    id:2, pts:9, cat:"확률", title:"주사위 확률",
    type:"mcq",
    body:`<p>두 개의 주사위를 동시에 던진다.</p>
<p><strong>두 눈의 합이 8 이상</strong>이 될 확률은 얼마인가?</p>
<div class="info-box">주사위는 공정하며, 각 면이 1~6의 숫자를 가진다.</div>`,
    opts:["5/18","7/18","5/12","7/36","15/36"],
    ans:2,
    expl:`<p>전체 경우의 수: 6 × 6 = 36</p>
<div class="math-step">합이 8 이상인 경우:
합=8: (2,6),(3,5),(4,4),(5,3),(6,2) → 5가지
합=9: (3,6),(4,5),(5,4),(6,3)       → 4가지
합=10:(4,6),(5,5),(6,4)             → 3가지
합=11:(5,6),(6,5)                   → 2가지
합=12:(6,6)                         → 1가지
합계: 5+4+3+2+1 = 15가지

확률 = 15/36 = 5/12</div>
<p>정답: <strong>5/12</strong></p>`
  },

  // ────────── 03 논리 (상자 문제 유사) ──────────
  {

<p>둘 중 <strong>하나도 준비하지 않는</strong> 학생은 몇 명인가?</p>`,
    opts:["3","4","5","6","7"],
    ans:2,
    expl:`<div class="math-step">|정보 ∪ 수학| = |정보| + |수학| - |정보 ∩ 수학|
             = 28 + 32 - 15 = 45

아무것도 준비하지 않는 학생 = 50 - 45 = 5명</div>
<p>정답: <strong>5명</strong></p>`
  },

  // ────────── 15 그리디 ──────────
  {
    id:15, pts:10, cat:"알고리즘", title:"회의실 배정",
    type:"mcq",
    body:"<p>하나의 회의실에서 여러 회의가 예정되어 있다. 각 회의는 시작 시간과 종료 시간이 있으며, 하나의 회의가 끝나야 다음 회의를 시작할 수 있다.</p><div class=\"code-box\">회의 목록 (시작, 종료):\nA: (1, 4)   B: (3, 5)   C: (0, 6)\nD: (5, 7)   E: (3, 9)   F: (5, 9)\nG: (6, 10)  H: (8, 11)  I: (8, 12)</div><p>최대로 진행할 수 있는 회의 수는?</p>",
    opts:["2","3","4","5","5"],
    ans:1,
    expl:"<p>그리디 알고리즘: <strong>종료 시간이 빠른 순서</strong>로 선택합니다.</p><div class=\"math-step\">종료 시간 오름차순 정렬:\nA(1,4), B(3,5), C(0,6), D(5,7), E(3,9), F(5,9), G(6,10), H(8,11), I(8,12)\n\n선택 과정:\n1. A(1-4) 선택 → 마지막 종료=4\n2. B(3,5): 시작 3 &lt; 4 → 제외\n3. C(0,6): 시작 0 &lt; 4 → 제외\n4. D(5,7): 시작 5 ≥ 4 → 선택! 마지막=7\n5. E(3,9): 시작 3 &lt; 7 → 제외\n6. F(5,9): 시작 5 &lt; 7 → 제외\n7. G(6,10): 시작 6 &lt; 7 → 제외\n8. H(8,11): 시작 8 ≥ 7 → 선택! 마지막=11\n9. I(8,12): 시작 8 &lt; 11 → 제외\n\n선택된 회의: A, D, H → 총 3개</div><p>정답: <strong>3</strong></p>"
  },

  // ────────── 16 재귀·하노이 ──────────
  {
    id:16, pts:10, cat:"재귀·알고리즘", title:"탑 쌓기",
    type:"mcq",
    body:"<p>3개의 기둥 A, B, C가 있다. 기둥 A에는 크기가 다른 원판 <strong>4개</strong>가 큰 것부터 아래에 쌓여 있다.</p><p><strong>하노이의 탑</strong> 규칙에 따라 기둥 A의 원판을 모두 기둥 C로 옮기려 한다:</p><ul style=\"margin:10px 0 10px 24px;line-height:2.2\"><li>한 번에 하나의 원판만 이동</li><li>큰 원판을 작은 원판 위에 올릴 수 없다</li></ul><p>최소 이동 횟수는?</p>",
    opts:["7","8","15","16","31"],
    ans:2,
    expl:"<div class=\"math-step\">하노이의 탑 최소 이동 횟수: T(n) = 2^n - 1\n\nn=4: T(4) = 2^4 - 1 = 15\n\n점화식 확인:\nT(1) = 1\nT(2) = 3\nT(3) = 7\nT(4) = 2×7 + 1 = 15</div><p>정답: <strong>15</strong></p>"
  },

  // ────────── 17 주관식: 약수 ──────────
  {
    id:17, pts:11, cat:"수론", title:"약수의 개수",
    type:"short",
    body:"<p>자연수 <strong>N = 2<sup>3</sup> × 3<sup>2</sup> × 5</strong> 의 약수의 개수를 구하시오.</p><div class=\"info-box\">소인수분해 형태로 주어진 수의 약수 개수 공식을 활용하세요.</div>",
    correct:"24",
    expl:"<div class=\"math-step\">N = 2³ × 3² × 5¹\n\n약수의 개수 공식: (지수+1)의 곱\n\n= (3+1) × (2+1) × (1+1)\n= 4 × 3 × 2\n= 24</div><p>정답: <strong>24</strong></p>"
  },

  // ────────── 18 주관식: 순열 ──────────
  {
    id:18, pts:11, cat:"순열·조합", title:"비밀번호 경우의 수",
    type:"short",
    body:"<p>0~9까지의 숫자를 사용하여 <strong>4자리 비밀번호</strong>를 만들려고 한다.</p><p>다음 조건을 <strong>모두</strong> 만족하는 비밀번호의 수를 구하시오:</p><ul style=\"margin:10px 0 10px 24px;line-height:2.2\"><li>첫 번째 자리는 0이 아니다.</li><li>같은 숫자가 <strong>연속으로 두 번</strong> 나오지 않는다. (예: 1234는 허용, 1123에서 11은 불허)</li><li>모든 자리의 숫자가 다를 필요는 없다.</li></ul>",
    correct:"6561",
    expl:"<div class=\"math-step\">첫 번째 자리: 1~9 → 9가지\n두 번째 자리: 앞 자리와 달라야 함 → 9가지\n세 번째 자리: 앞(2번째)과 달라야 함 → 9가지\n네 번째 자리: 앞(3번째)과 달라야 함 → 9가지\n\n총 경우의 수 = 9 × 9 × 9 × 9 = 9⁴ = 6561</div><p>정답: <strong>6561</strong></p>"
  },

  // ────────── 19 BFS/최단거리 ──────────
  {
    id:19, pts:11, cat:"BFS·탐색", title:"미로 탈출",
    type:"mcq",
    body:"<p>아래 5×5 격자 미로에서 S(출발)에서 E(도착)까지의 <strong>최단 이동 횟수</strong>는? (상하좌우 이동, 벽은 ■)</p><div class=\"code-box\">S . . ■ .\n■ ■ . ■ .\n. . . . .\n. ■ ■ ■ .\n. . . . E</div><p style=\"font-size:13px;color:var(--muted)\">이동 횟수 = 지나간 칸의 수 - 1 (S와 E 제외)</p>",
    opts:["6","7","8","9","10"],
    ans:2,
    expl:"<p>BFS로 최단 경로를 추적합니다:</p><div class=\"math-step\">좌표 (행,열) 기준 (0-indexed):\nS=(0,0), E=(4,4)\n\n최단 경로:\n(0,0)→(0,1)→(0,2)→(1,2)→(2,2)→(2,3)→(2,4)→(3,4)→(4,4)\n\n벽 통과 불가 확인:\n(0,3)=■ (1,0)=■ (1,1)=■ (1,3)=■ (3,1)=■ (3,2)=■ (3,3)=■\n\n경유 칸: 9칸 → 이동 횟수 = 8회</div><p>정답: <strong>8</strong></p>"
  },

  // ────────── 20 DP 최적화 ──────────
  {
    id:20, pts:11, cat:"동적 프로그래밍", title:"최대 부분합",
    type:"mcq",
    body:"<p>아래 정수 배열에서 <strong>연속된 부분 배열의 합</strong> 중 <strong>최댓값</strong>을 구하시오.</p><div class=\"code-box\">-2, 1, -3, 4, -1, 2, 1, -5, 4</div><p style=\"font-size:13px;color:var(--muted)\">하나 이상의 원소를 포함해야 하며, 부분 배열은 연속되어야 한다.</p>",
    opts:["4","5","6","7","8"],
    ans:2,
    expl:"<p>카데인(Kadane) 알고리즘:</p><div class=\"math-step\">배열: [-2, 1, -3, 4, -1, 2, 1, -5, 4]\n\ni=0: cur=-2,  best=-2\ni=1: cur=1,   best=1\ni=2: cur=-2,  best=1\ni=3: cur=4,   best=4\ni=4: cur=3,   best=4\ni=5: cur=5,   best=5\ni=6: cur=6,   best=6  ← [4,-1,2,1]\ni=7: cur=1,   best=6\ni=8: cur=5,   best=6\n\n최대 부분합 = 6</div><p>정답: <strong>6</strong></p>"
  }
];

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let S = {
  cur: 0,
  chosen: new Array(QS.length).fill(null),
  typed:  new Array(QS.length).fill(''),
  done:   new Array(QS.length).fill(false),
  elapsed: 0, timer: null, total: 90*60
};

// ═══════════════════════════════════════
//  START
// ═══════════════════════════════════════
function startExam() {
  document.getElementById('splash').classList.add('gone');
  document.getElementById('hdr').style.display = 'flex';
  document.getElementById('pbar').style.display = 'block';
  document.getElementById('app').style.display = 'block';
  buildDots();
  render(0);
  S.timer = setInterval(tick, 1000);
}

function tick() {
  S.elapsed++;
  const rem = S.total - S.elapsed;
  if (rem <= 0) { clearInterval(S.timer); showResult(); return; }
  const m = Math.floor(rem/60), s = rem%60;
  const el = document.getElementById('tmr');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (rem <= 300) el.classList.add('warn');
}

function buildDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  QS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'hdot' + (i===0?' current':'');
    d.id = `d${i}`; d.title = `${i+1}번`;
    d.onclick = () => go(i);
    c.appendChild(d);
  });
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render(idx) {
  S.cur = idx;
  updateDots(); updateProgress();
  const q = QS[idx];
  const app = document.getElementById('app');

  // options / short answer
  let inputHTML = '';
  if (q.type === 'short') {
    const val = S.typed[idx] || '';
    const cls = S.done[idx] ? (val === q.correct ? 'ok' : 'bad') : '';
    inputHTML = `
      <div class="sa-wrap">
        <div class="sa-label">▸ 정수 값을 입력하세요</div>
        <input class="sa-input ${cls}" id="sai" type="text"
          placeholder="답 입력..."
          value="${val}"
          ${S.done[idx]?'disabled':''}
          oninput="S.typed[${idx}]=this.value"
        />
      </div>`;
  } else {
    const lbls = ['①','②','③','④','⑤'];
    inputHTML = `<div class="opts">${q.opts.map((o,oi)=>{
      let cls='';
      if(S.done[idx]){
        if(oi===q.ans) cls='ok';
        else if(oi===S.chosen[idx]&&oi!==q.ans) cls='bad';
        cls+=' disabled';
      } else if(oi===S.chosen[idx]) cls='sel';
      return `<button class="opt ${cls}" onclick="pick(${idx},${oi})">
        <span class="opt-lbl">${lbls[oi]}</span><span>${o}</span>
      </button>`;
    }).join('')}</div>`;
  }

  // verdict
  let verdict='';
  if(S.done[idx]) {
    const ok = isOk(idx);
    verdict = ok
      ? '<span class="verdict-ok">✓ 정답!</span>'
      : '<span class="verdict-bad">✗ 오답</span>';
  }

  // answer chip
  let chip='';
  if(q.type==='short') chip=`<div class="answer-chip">정답: ${q.correct}</div>`;
  else chip=`<div class="answer-chip">정답: ${['①','②','③','④','⑤'][q.ans]} ${q.opts[q.ans]}</div>`;

  const isLast = idx === QS.length-1;

  app.innerHTML = `
  <div class="qcard on">
    <div class="qcard-top">
      <div class="qnum">${String(idx+1).padStart(2,'0')}</div>
      <div style="flex:1;padding:8px 20px">
        <div class="qcat">${q.cat}</div>
        <div class="qtitle">${q.title}</div>
      </div>
      <div class="qpts">+${q.pts}점</div>
    </div>

    <div class="qbody">${q.body}</div>

    ${inputHTML}

    <div class="expl ${S.done[idx]?'on':''}" id="expl">
      <div class="expl-head">
        <span class="expl-icon">💡</span>
        <span class="expl-title">해설</span>
        ${verdict}
      </div>
      <div class="expl-body">
        ${S.done[idx]?chip:''}
        ${q.expl}
      </div>
    </div>

    <div class="nav-row">
      <button class="btn" onclick="go(${idx-1})" ${idx===0?'disabled':''}>← 이전</button>
      <div style="display:flex;gap:8px">
        ${!S.done[idx]
          ? `<button class="btn btn-submit" onclick="submit(${idx})">정답 제출</button>`
          : ''
        }
        ${isLast
          ? `<button class="btn btn-end" onclick="showResult()">🏁 채점 완료</button>`
          : `<button class="btn" onclick="go(${idx+1})">다음 →</button>`
        }
      </div>
    </div>
  </div>`;
}

function updateDots() {
  QS.forEach((_,i)=>{
    const d=document.getElementById(`d${i}`);
    if(!d)return;
    d.className='hdot';
    if(i===S.cur) d.classList.add('current');
    else if(S.done[i]) d.classList.add(isOk(i)?'ok':'bad');
    else if(S.chosen[i]!==null||S.typed[i]) d.classList.add('answered');
  });
}

function updateProgress() {
  const pct=((S.cur+1)/QS.length)*100;
  document.getElementById('pfill').style.width=pct+'%';
  const sc=calcScore();
  document.getElementById('hpts').textContent=`${sc} / 200점`;
}

// ═══════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════
function pick(qi,oi){
  if(S.done[qi])return;
  S.chosen[qi]=oi;
  render(qi);
}

function submit(qi){
  const q=QS[qi];
  if(q.type==='short'){
    const inp=document.getElementById('sai');
    if(inp) S.typed[qi]=inp.value.trim();
  } else {
    if(S.chosen[qi]===null) return;
  }
  S.done[qi]=true;
  render(qi);
}

function go(i){
  if(i<0||i>=QS.length)return;
  render(i);
}

function isOk(i){
  const q=QS[i];
  if(q.type==='short') return S.typed[i]===q.correct;
  return S.chosen[i]===q.ans;
}

function calcScore(){
  return QS.reduce((sum,q,i)=>sum+(S.done[i]&&isOk(i)?q.pts:0),0);
}

// ═══════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════
function showResult(){
  clearInterval(S.timer);
  const score=calcScore();
  const ok=QS.filter((_,i)=>S.done[i]&&isOk(i)).length;
  const bad=QS.filter((_,i)=>S.done[i]&&!isOk(i)).length;
  const m=Math.floor(S.elapsed/60), s=S.elapsed%60;

  const pct=(score/200)*100;
  let grade='', gc='';
  if(pct>=90){grade='🥇 최우수 — 금상 수준';gc='#b8860b';}
  else if(pct>=75){grade='🥈 우수 — 은상 수준';gc='#708090';}
  else if(pct>=60){grade='🥉 양호 — 동상 수준';gc='#cd7f32';}
  else if(pct>=40){grade='📘 보통 — 계속 도전!';gc='var(--accent2)';}
  else{grade='💪 분발 — 다시 도전!';gc='var(--muted)';}

  document.getElementById('rscore').textContent=score;
  document.getElementById('rgrade').style.color=gc;
  document.getElementById('rgrade').textContent=grade;
  document.getElementById('rn-ok').textContent=ok;
  document.getElementById('rn-bad').textContent=bad;
  document.getElementById('rn-time').textContent=`${m}:${String(s).padStart(2,'0')}`;

  const list=document.getElementById('rlist');
  list.innerHTML='';
  QS.forEach((q,i)=>{
    const ok2=S.done[i]&&isOk(i);
    const bad2=S.done[i]&&!isOk(i);
    const div=document.createElement('div');
    div.className=`rev-item ${ok2?'ri-ok':''} ${bad2?'ri-bad':''}`;
    div.innerHTML=`
      <div class="rev-n">Q${String(i+1).padStart(2,'0')} · ${q.pts}점</div>
      <div class="rev-t">${q.title}</div>
      <div class="rev-mark">${ok2?'✅':bad2?'❌':'⬜'}</div>`;
    div.onclick=()=>{
      document.getElementById('result').classList.remove('on');
      render(i);
    };
    list.appendChild(div);
  });

  document.getElementById('result').classList.add('on');
}

function restartExam(){
  S={cur:0,chosen:new Array(QS.length).fill(null),
     typed:new Array(QS.length).fill(''),
     done:new Array(QS.length).fill(false),
     elapsed:0,timer:null,total:90*60};
  document.getElementById('result').classList.remove('on');
  document.getElementById('tmr').textContent='90:00';
  document.getElementById('tmr').classList.remove('warn');
  buildDots();
  render(0);
  S.timer=setInterval(tick,1000);
}
</script>
</body>
</html>
